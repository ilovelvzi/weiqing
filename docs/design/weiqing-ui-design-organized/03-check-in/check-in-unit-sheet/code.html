<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport">
<title>微轻 - 打卡输入页</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap');
    /* SF Pro fallback for iOS style */
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .material-symbols-outlined {
        font-variation-settings: 'wght' 400, 'FILL' 0;
    }
</style>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "surface-variant": "#dce3f2",
                    "outline": "#727782",
                    "on-background": "#151c27",
                    "on-tertiary-fixed": "#261900",
                    "error": "#ba1a1a",
                    "surface": "#f9f9ff",
                    "surface-container-high": "#e2e8f8",
                    "primary": "#205fa5",
                    "on-tertiary": "#ffffff",
                    "background": "#f9f9ff",
                    "primary-container": "#7eb3ff",
                    "primary-fixed-dim": "#a6c8ff",
                    "on-secondary-fixed": "#002113",
                    "error-container": "#ffdad6",
                    "on-primary-fixed": "#001c3a",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-container": "#554013",
                    "surface-dim": "#d3dae9",
                    "outline-variant": "#c2c6d2",
                    "on-primary-fixed-variant": "#004786",
                    "inverse-primary": "#a6c8ff",
                    "surface-tint": "#205fa5",
                    "surface-container-highest": "#dce3f2",
                    "secondary-container": "#bfedd1",
                    "on-surface-variant": "#424751",
                    "on-primary-container": "#004481",
                    "tertiary": "#725b2b",
                    "on-secondary-container": "#436d57",
                    "tertiary-fixed": "#fedfa3",
                    "primary-fixed": "#d4e3ff",
                    "on-primary": "#ffffff",
                    "surface-bright": "#f9f9ff",
                    "on-error": "#ffffff",
                    "on-tertiary-fixed-variant": "#584416",
                    "surface-container-low": "#f0f3ff",
                    "secondary": "#3d6751",
                    "inverse-on-surface": "#ebf1ff",
                    "secondary-fixed-dim": "#a4d1b6",
                    "on-surface": "#151c27",
                    "inverse-surface": "#2a313c",
                    "on-secondary": "#ffffff",
                    "on-secondary-fixed-variant": "#254f3a",
                    "tertiary-container": "#caad75",
                    "secondary-fixed": "#bfedd1",
                    "on-error-container": "#93000a",
                    "tertiary-fixed-dim": "#e1c389",
                    "surface-container": "#e7eefe"
                },
                "spacing": {
                    "margin-mobile": "20px",
                }
            }
        }
    }
</script>
<style>
    .keyboard-btn {
        background-color: #ffffff;
        box-shadow: 0px 1px 0px rgba(0, 0, 0, 0.1);
        border-radius: 8px;
        transition: background-color 0.1s;
    }
    .keyboard-btn:active {
        background-color: #e2e8f8;
    }
    .chip {
        transition: all 0.2s;
    }
    .chip.active {
        background-color: rgba(32, 95, 165, 0.1);
        color: #205fa5;
        border-color: rgba(32, 95, 165, 0.3);
    }
</style>
</head>
<body class="bg-background text-on-background min-h-screen antialiased select-none overflow-hidden relative">
<!-- Background: Dimmed Home Screen Representation -->
<!-- We use an iframe or just a mock image placeholder with a dark overlay to represent the home screen behind the sheet -->
<div class="fixed inset-0 w-full h-full bg-surface-container-lowest z-0 flex flex-col items-center pt-20">
<div class="text-on-surface-variant opacity-50 text-center">
<!-- Mock background content behind the dim overlay -->
<h1 class="text-2xl font-bold mb-4">微轻</h1>
<div class="w-[90%] h-40 bg-surface-container-high rounded-xl mb-4"></div>
<div class="w-[90%] h-32 bg-surface-container-high rounded-xl"></div>
</div>
</div>
<!-- Backdrop Overlay -->
<div class="fixed inset-0 bg-black/40 z-40 backdrop-blur-[2px] transition-opacity duration-300"></div>
<!-- Primary Bottom Sheet -->
<div class="fixed inset-x-0 bottom-0 z-50 bg-surface-container-lowest rounded-t-[28px] shadow-[0_-8px_30px_rgba(0,0,0,0.1)] flex flex-col pt-3 pb-[env(safe-area-inset-bottom)] transition-transform duration-300 transform translate-y-0 h-[85vh]" id="main-sheet">
<!-- Drag Handle -->
<div class="w-10 h-1.5 bg-outline-variant/40 rounded-full mx-auto mb-6"></div>
<div class="flex-1 overflow-y-auto flex flex-col">
<!-- Large Number Input Area -->
<div class="flex flex-col items-center mt-2">
<div class="flex items-center justify-center gap-3">
<span class="text-[64px] leading-none text-on-background font-bold tabular-nums tracking-tight" id="weight-display">65.5</span>
<button class="flex items-center gap-1 bg-surface-container-low hover:bg-surface-container-high active:bg-surface-variant px-3 py-2 rounded-xl text-primary font-medium text-[17px] transition-colors min-h-[44px] mt-2" onclick="toggleSettings()">
<span id="current-unit">kg</span>
<span class="material-symbols-outlined text-[20px]">expand_more</span>
</button>
</div>
</div>
<!-- Date/Time Pill Button -->
<div class="mt-6 flex justify-center">
<button class="flex items-center gap-1.5 bg-surface-container-low hover:bg-surface-container-high active:bg-surface-variant transition-colors px-5 py-2.5 rounded-full shadow-sm min-h-[44px]">
<span class="material-symbols-outlined text-[18px] text-primary">calendar_today</span>
<span class="text-[15px] font-medium text-on-surface">今天 · 晚上</span>
<span class="material-symbols-outlined text-[18px] text-on-surface-variant">expand_more</span>
</button>
</div>
<!-- Tag Selection Area -->
<div class="mt-8 w-full px-margin-mobile">
<div class="flex flex-wrap justify-center gap-2.5 max-w-sm mx-auto">
<button aria-pressed="false" class="chip px-4 py-2 rounded-full border border-outline-variant/60 text-[15px] text-on-surface-variant bg-surface min-h-[44px]">裸重</button>
<button aria-pressed="false" class="chip px-4 py-2 rounded-full border border-outline-variant/60 text-[15px] text-on-surface-variant bg-surface min-h-[44px]">饭后</button>
<button aria-pressed="false" class="chip px-4 py-2 rounded-full border border-outline-variant/60 text-[15px] text-on-surface-variant bg-surface min-h-[44px]">运动后</button>
<button aria-pressed="false" class="chip px-4 py-2 rounded-full border border-outline-variant/60 text-[15px] text-on-surface-variant bg-surface min-h-[44px]">生理期</button>
<button aria-pressed="false" class="chip px-4 py-2 rounded-full border border-outline-variant/60 text-[15px] text-on-surface-variant bg-surface min-h-[44px]">聚餐</button>
<button aria-pressed="false" class="chip px-4 py-2 rounded-full border border-outline-variant/60 text-[15px] text-on-surface-variant bg-surface min-h-[44px]">外卖</button>
<button class="px-4 py-2 rounded-full border border-outline-variant/60 bg-surface-container-low text-[15px] text-on-surface-variant hover:bg-surface-container-high flex items-center gap-1 min-h-[44px]">
<span class="material-symbols-outlined text-[18px]">add</span>
                    自定义
                </button>
</div>
</div>
<!-- Spacer -->
<div class="flex-1"></div>
<!-- Bottom Area: Keyboard & Submit Button -->
<div class="w-full bg-surface-container-lowest px-2 pt-4 pb-[env(safe-area-inset-bottom)]">
<!-- Custom Numeric Keyboard -->
<div class="grid grid-cols-3 gap-2 max-w-sm mx-auto mb-4 p-2 bg-surface-container-low rounded-2xl">
<button aria-label="1" class="keyboard-btn h-12 flex items-center justify-center text-2xl font-medium text-on-surface">1</button>
<button aria-label="2" class="keyboard-btn h-12 flex items-center justify-center text-2xl font-medium text-on-surface">2</button>
<button aria-label="3" class="keyboard-btn h-12 flex items-center justify-center text-2xl font-medium text-on-surface">3</button>
<button aria-label="4" class="keyboard-btn h-12 flex items-center justify-center text-2xl font-medium text-on-surface">4</button>
<button aria-label="5" class="keyboard-btn h-12 flex items-center justify-center text-2xl font-medium text-on-surface">5</button>
<button aria-label="6" class="keyboard-btn h-12 flex items-center justify-center text-2xl font-medium text-on-surface">6</button>
<button aria-label="7" class="keyboard-btn h-12 flex items-center justify-center text-2xl font-medium text-on-surface">7</button>
<button aria-label="8" class="keyboard-btn h-12 flex items-center justify-center text-2xl font-medium text-on-surface">8</button>
<button aria-label="9" class="keyboard-btn h-12 flex items-center justify-center text-2xl font-medium text-on-surface">9</button>
<button aria-label="小数点" class="h-12 flex items-center justify-center text-2xl font-medium text-on-surface-variant active:bg-surface-variant rounded-[8px] transition-colors">.</button>
<button aria-label="0" class="keyboard-btn h-12 flex items-center justify-center text-2xl font-medium text-on-surface">0</button>
<button aria-label="删除" class="h-12 flex items-center justify-center text-on-surface-variant active:bg-surface-variant rounded-[8px] transition-colors">
<span class="material-symbols-outlined text-[24px]">backspace</span>
</button>
</div>
<!-- Primary Action Button -->
<div class="px-margin-mobile w-full max-w-sm mx-auto mb-4">
<button class="w-full bg-primary text-on-primary min-h-[50px] rounded-full font-semibold text-[17px] shadow-sm hover:opacity-90 active:scale-95 transition-all">
                    完成记录
                </button>
</div>
</div>
</div>
</div>
<!-- Secondary Settings Sheet (Overlays main sheet) -->
<div class="fixed inset-x-0 bottom-0 z-[60] bg-surface-container-lowest rounded-t-[28px] shadow-[0_-8px_30px_rgba(0,0,0,0.1)] flex flex-col pt-3 pb-[env(safe-area-inset-bottom)] transition-transform duration-300 transform translate-y-full max-h-[50vh]" id="settings-sheet">
<div class="w-10 h-1.5 bg-outline-variant/40 rounded-full mx-auto mb-4"></div>
<div class="relative flex items-center justify-center mb-4 px-4 min-h-[44px]">
<button class="absolute right-4 p-2 text-on-surface-variant min-h-[44px] flex items-center justify-center rounded-full active:bg-surface-variant" onclick="toggleSettings()">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
<h2 class="text-[17px] font-semibold text-on-surface">单位与精度</h2>
</div>
<div class="px-margin-mobile flex-1 overflow-y-auto w-full max-w-sm mx-auto pb-6">
<!-- Section: Unit -->
<div class="mb-6">
<h3 class="text-[13px] font-medium text-on-surface-variant uppercase tracking-wider mb-2 px-4">体重单位</h3>
<div class="bg-surface rounded-xl overflow-hidden divide-y divide-outline-variant/20 border border-outline-variant/20">
<button class="w-full flex items-center justify-between px-4 py-3 bg-surface text-[17px] text-on-surface active:bg-surface-variant min-h-[44px]">
<span>公斤 (kg)</span>
<span class="material-symbols-outlined text-primary text-[20px]">check</span>
</button>
<button class="w-full flex items-center justify-between px-4 py-3 bg-surface text-[17px] text-on-surface active:bg-surface-variant min-h-[44px]">
<span>斤</span>
</button>
<button class="w-full flex items-center justify-between px-4 py-3 bg-surface text-[17px] text-on-surface active:bg-surface-variant min-h-[44px]">
<span>磅 (lb)</span>
</button>
</div>
</div>
<!-- Section: Precision -->
<div class="mb-2">
<h3 class="text-[13px] font-medium text-on-surface-variant uppercase tracking-wider mb-2 px-4">小数位</h3>
<div class="bg-surface rounded-xl overflow-hidden divide-y divide-outline-variant/20 border border-outline-variant/20">
<button class="w-full flex items-center justify-between px-4 py-3 bg-surface text-[17px] text-on-surface active:bg-surface-variant min-h-[44px]">
<span>1位小数 (如 65.5)</span>
<span class="material-symbols-outlined text-primary text-[20px]">check</span>
</button>
<button class="w-full flex items-center justify-between px-4 py-3 bg-surface text-[17px] text-on-surface active:bg-surface-variant min-h-[44px]">
<span>2位小数 (如 65.50)</span>
</button>
</div>
</div>
</div>
</div>
<!-- Overlay for secondary sheet -->
<div class="fixed inset-0 bg-black/20 z-[55] opacity-0 pointer-events-none transition-opacity duration-300" id="settings-backdrop" onclick="toggleSettings()"></div>
<script>
    // Toggle secondary settings sheet
    const settingsSheet = document.getElementById('settings-sheet');
    const settingsBackdrop = document.getElementById('settings-backdrop');
    let settingsOpen = false;

    function toggleSettings() {
        settingsOpen = !settingsOpen;
        if (settingsOpen) {
            settingsSheet.classList.remove('translate-y-full');
            settingsSheet.classList.add('translate-y-0');
            settingsBackdrop.classList.remove('opacity-0', 'pointer-events-none');
            settingsBackdrop.classList.add('opacity-100');
        } else {
            settingsSheet.classList.remove('translate-y-0');
            settingsSheet.classList.add('translate-y-full');
            settingsBackdrop.classList.remove('opacity-100');
            settingsBackdrop.classList.add('opacity-0', 'pointer-events-none');
        }
    }

    // Chip toggling
    document.querySelectorAll('.chip').forEach(button => {
        button.addEventListener('click', function() {
            this.classList.toggle('active');
            let isPressed = this.getAttribute('aria-pressed') === 'true';
            this.setAttribute('aria-pressed', !isPressed);
        });
    });

    // Keyboard interaction
    const display = document.getElementById('weight-display');
    document.querySelectorAll('.keyboard-btn, [aria-label="小数点"], [aria-label="删除"]').forEach(btn => {
        btn.addEventListener('click', function() {
            const val = this.textContent.trim();
            const isDelete = this.querySelector('.material-symbols-outlined');
            
            if (isDelete) {
                if (display.textContent.length > 1) {
                    display.textContent = display.textContent.slice(0, -1);
                } else {
                    display.textContent = '0';
                }
            } else if (val === '.') {
                if (!display.textContent.includes('.')) {
                    display.textContent += '.';
                }
            } else {
                if (display.textContent === '0') {
                    display.textContent = val;
                } else if (display.textContent.length < 6) {
                    display.textContent += val;
                }
            }
        });
    });
</script>
</body></html>
