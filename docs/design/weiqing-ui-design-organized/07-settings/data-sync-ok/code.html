<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom grouped list separator */
        .grouped-list-item:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 16px; /* Align with text, skipping icon/left padding */
            right: 0;
            height: 1px;
            background-color: theme('colors.outline-variant');
            opacity: 0.2;
        }
        
        /* Smooth iOS Switch Transition */
        .ios-switch-knob {
            transition: transform 0.3s cubic-bezier(0.2, 0.85, 0.32, 1.2);
        }
        .ios-switch-bg {
            transition: background-color 0.3s ease-in-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface-bright text-on-background min-h-screen pb-safe">
<!-- TopAppBar (Customized for Sub-page context - No Nav Shell rendering allowed per logic) -->
<header class="fixed top-0 w-full z-50 bg-surface/90 dark:bg-on-surface/90 backdrop-blur-md border-b border-outline-variant/10 flex items-center h-11 px-4 w-full pt-safe">
<button aria-label="返回" class="flex items-center gap-1 text-primary active:opacity-50 transition-opacity">
<span class="material-symbols-outlined text-2xl font-bold">chevron_left</span>
</button>
<h1 class="absolute left-1/2 -translate-x-1/2 font-semibold text-[17px] text-on-surface">
            数据同步
        </h1>
</header>
<!-- Main Content Canvas -->
<main class="pt-[calc(44px+env(safe-area-inset-top))] px-4 pb-lg max-w-lg mx-auto flex flex-col gap-6">
<!-- Module 1: Sync Status Card -->
<section class="mt-md">
<div class="bg-surface-container-lowest rounded-[24px] p-md shadow-[0_12px_40px_rgba(32,95,165,0.04)] border border-outline-variant/10 relative overflow-hidden flex flex-col gap-gutter">
<!-- Decorative background blur -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none"></div>
<div class="flex items-start gap-sm">
<div class="w-12 h-12 rounded-full bg-secondary-container/50 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-secondary font-medium" style="font-variation-settings: 'FILL' 1;">cloud_done</span>
</div>
<div class="flex flex-col pt-1">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface text-[20px] leading-tight">数据已同步</h2>
<p class="font-body-md text-body-md text-on-surface-variant text-sm mt-1">你的记录已安全保存。离线期间产生的数据，会在联网后自动同步。</p>
</div>
</div>
<div class="bg-surface-container-low rounded-xl p-sm flex flex-col gap-2 mt-2">
<div class="flex justify-between items-center font-label-sm text-label-sm">
<span class="text-on-surface-variant">最近同步</span>
<span class="text-on-surface">今天 08:30</span>
</div>
<div class="flex justify-between items-center font-label-sm text-label-sm">
<span class="text-on-surface-variant">本地记录</span>
<span class="text-on-surface">已保存</span>
</div>
<div class="flex justify-between items-center font-label-sm text-label-sm">
<span class="text-on-surface-variant">云端备份</span>
<span class="text-primary">已完成</span>
</div>
</div>
</div>
</section>
<!-- Module 2 & 3: Auto Sync & Status (Grouped) -->
<section class="flex flex-col gap-2"><h3 class="px-4 pb-2 font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">自动同步设置</h3>
<div class="bg-surface-container-lowest rounded-[16px] shadow-[0_4px_20px_rgba(32,95,165,0.03)] border border-outline-variant/10 overflow-hidden">
<div class="relative flex flex-col p-4 active:bg-surface-container-low/50 transition-colors">
<div class="flex justify-between items-center w-full">
<span class="font-body-md text-body-md text-on-surface">自动同步</span>
<button aria-pressed="true" class="ios-switch-bg w-[51px] h-[31px] rounded-full bg-primary relative cursor-pointer" role="switch">
<div class="ios-switch-knob w-[27px] h-[27px] bg-white rounded-full absolute top-[2px] left-[2px] shadow-sm transform translate-x-[20px]"></div>
</button>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1 pr-12">联网后自动同步体重、健康数据和饮食线索。</p>
</div>
</div></section><section class="flex flex-col gap-2">
<h3 class="px-4 font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">同步状态</h3>
<div class="bg-surface-container-lowest rounded-[16px] shadow-[0_4px_20px_rgba(32,95,165,0.03)] border border-outline-variant/10 overflow-hidden flex flex-col">
<div class="grouped-list-item relative flex justify-between items-center p-4 min-h-[44px]">
<span class="font-body-md text-body-md text-on-surface">待同步记录</span>
<span class="font-body-md text-body-md text-on-surface-variant">0 条</span>
</div>
<div class="relative flex justify-between items-center p-4 min-h-[44px]">
<span class="font-body-md text-body-md text-on-surface">同步失败</span>
<span class="font-body-md text-body-md text-on-surface-variant">0 条</span>
</div>
</div>
</section>
<!-- Module 4: Manual Operations -->
<section class="flex flex-col gap-2">
<h3 class="px-4 font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">手动操作</h3>
<div class="bg-surface-container-lowest rounded-[16px] shadow-[0_4px_20px_rgba(32,95,165,0.03)] border border-outline-variant/10 overflow-hidden flex flex-col">
<!-- Sync Now Action -->
<button class="grouped-list-item relative flex flex-col items-start p-4 min-h-[44px] w-full text-left active:bg-surface-container-low/50 transition-colors">
<div class="flex justify-between items-center w-full">
<span class="font-body-md text-body-md text-primary">立即同步</span>
<span class="material-symbols-outlined text-outline-variant text-sm">chevron_right</span>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1 pr-6">手动同步当前设备上的未同步数据</p>
</button>
<!-- View Instructions -->
<button class="relative flex justify-between items-center p-4 min-h-[44px] w-full text-left active:bg-surface-container-low/50 transition-colors">
<span class="font-body-md text-body-md text-on-surface">查看同步说明</span>
<span class="material-symbols-outlined text-outline-variant text-sm">chevron_right</span>
</button>
</div>
</section>
<!-- Module 5: Instruction Card -->
<section class="mb-6">
<div class="bg-surface-container-low/50 rounded-[16px] p-md border border-outline-variant/5">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-tertiary font-medium text-lg" style="font-variation-settings: 'FILL' 1;">info</span>
<h4 class="font-label-sm text-label-sm text-on-surface font-semibold">离线记录不会丢失</h4>
</div>
<p class="font-body-md text-body-md text-on-surface-variant text-sm leading-relaxed">
                    即使无网络，你的记录也会优先安全保存在本地。当设备重新连接网络时，系统会自动在后台静默同步。<br><br>
                    请注意：若在未联网状态下退出登录，离线数据暂不可见，重新登录后系统将继续尝试同步。
                </p>
</div>
</section>
</main>
<script>
        // Simple script to handle switch toggle visually for demo purposes
        document.querySelectorAll('[role="switch"]').forEach(switchBtn => {
            switchBtn.addEventListener('click', function() {
                const isPressed = this.getAttribute('aria-pressed') === 'true';
                const knob = this.querySelector('.ios-switch-knob');
                
                if (isPressed) {
                    this.setAttribute('aria-pressed', 'false');
                    this.classList.remove('bg-primary');
                    this.classList.add('bg-surface-variant');
                    knob.classList.remove('translate-x-[20px]');
                    knob.classList.add('translate-x-0');
                } else {
                    this.setAttribute('aria-pressed', 'true');
                    this.classList.remove('bg-surface-variant');
                    this.classList.add('bg-primary');
                    knob.classList.remove('translate-x-0');
                    knob.classList.add('translate-x-[20px]');
                }
            });
        });
    </script>
</body></html>
