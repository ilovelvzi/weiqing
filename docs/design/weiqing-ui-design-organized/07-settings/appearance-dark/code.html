<style>
        body {
            -webkit-tap-highlight-color: transparent;
            background-color: #f2f2f7; /* iOS standard grouped background */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        }
        .ios-list-item:active {
            background-color: #e5e5ea;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="text-on-surface antialiased pb-lg" style="background-color: #000000; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;">
<!-- Top Navigation -->
<nav class="fixed top-0 w-full z-50 backdrop-blur-md border-b border-outline-variant/20 pt-safe bg-black/90">
<div class="flex items-center justify-between h-[44px] px-margin-mobile">
<button class="flex items-center text-primary active:opacity-70 transition-opacity min-w-[44px] min-h-[44px]">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'wght' 400">arrow_back_ios_new</span>
</button>
<h1 class="font-semibold text-[17px] text-white">外观设置</h1>
<div class="min-w-[44px]"></div> <!-- Spacer for centering -->
</div>
</nav>
<!-- Main Content Canvas -->
<main class="pt-[88px] px-margin-mobile max-w-md mx-auto space-y-md">
<!-- Module 1: Preview Card -->
<section class="flex flex-col items-center">
<div class="bg-white rounded-3xl w-full max-w-[240px] aspect-[1/1.4] p-sm shadow-[0_8px_30px_rgba(32,95,165,0.08)] flex flex-col items-center justify-between border border-outline-variant/10 relative overflow-hidden">
<!-- Mini UI Mockup -->
<div class="w-full mt-4 flex flex-col items-center space-y-4">
<div class="text-center">
<span class="text-[10px] text-outline font-medium">今日体重</span>
<div class="font-display-num text-[32px] text-on-surface leading-none tracking-tighter mt-1">65.5</div>
<span class="text-[10px] text-outline font-medium">kg</span>
</div>
<div class="w-3/4 h-2 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full w-2/3 bg-primary rounded-full"></div>
</div>
<div class="w-2/3 h-8 bg-primary/10 rounded-full flex items-center justify-center mt-2">
<span class="text-[10px] text-primary font-medium">轻轻记录一下</span>
</div>
</div>
<div class="absolute bottom-4 left-0 w-full text-center">
<span class="text-[11px] font-medium text-outline bg-surface-container-high/50 px-3 py-1 rounded-full backdrop-blur-sm">外观预览</span>
</div>
</div>
<p class="mt-4 text-[13px] font-medium text-center">当前状态：深色模式</p>
<p class="mt-2 text-[12px] text-outline text-center leading-relaxed px-4">外观设置会影响首页、记录、分析、我的和所有设置页面。</p>
</section>
<!-- Module 2: Appearance Mode -->
<section class="mt-lg">
<div class="rounded-[10px] overflow-hidden shadow-sm bg-[#1c1c1e]">
<button class="w-full flex items-center justify-between p-[16px] ios-list-item transition-colors min-h-[44px] relative border-b border-outline-variant/20">
<div class="flex flex-col items-start text-left">
<span class="text-[17px] text-white">跟随系统</span>
<span class="text-[13px] text-outline mt-1">根据系统浅色 / 深色模式自动切换</span>
</div>
</button>
<button class="w-full flex items-center justify-between p-[16px] ios-list-item transition-colors min-h-[44px] relative border-b border-outline-variant/20">
<div class="flex flex-col items-start text-left">
<span class="text-[17px] text-white">浅色模式</span>
<span class="text-[13px] text-outline mt-1">始终使用浅色外观</span>
</div>
</button>
<button class="w-full flex items-center justify-between p-[16px] ios-list-item transition-colors min-h-[44px]">
<div class="flex flex-col items-start text-left">
<span class="text-[17px] text-white">深色模式</span>
<span class="text-[13px] text-outline mt-1">始终使用深色外观</span>
</div>
<span class="material-symbols-outlined text-primary text-[20px]" style="font-variation-settings: 'wght' 600">check</span></button>
</div>
</section>
<!-- Module 3: Brand Color Description -->
<section class="mt-lg">
<h2 class="text-[13px] text-outline ml-4 mb-2 uppercase tracking-wider">品牌色</h2>
<div class="rounded-[10px] overflow-hidden shadow-sm bg-[#1c1c1e]">
<div class="w-full flex items-center justify-between p-[16px] min-h-[44px]">
<span class="text-[17px] text-white">微轻蓝色</span>
<div class="w-5 h-5 rounded-full bg-primary shadow-inner"></div>
</div>
</div>
<p class="mt-2 text-[13px] text-outline px-4 leading-relaxed">
                微轻会保持统一的蓝色点缀，用于按钮、进度、选中状态和重要操作。
            </p>
</section>
<!-- Module 4: Bottom Info Card -->
<section class="mt-md mb-xl">
<div class="bg-surface-container-high/30 rounded-2xl p-4 border border-outline-variant/10">
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-primary/70 text-[20px] mt-0.5">info</span>
<p class="text-[13px] leading-relaxed text-gray-400">
                        深色模式会降低夜间使用时的屏幕亮度感。体重、记录和报告内容不会因为外观模式而改变。
                    </p>
</div>
</div>
</section>
</main>
<script>
        // Simple interaction for list items to show checkmark
        document.addEventListener('DOMContentLoaded', () => {
            const listItems = document.querySelectorAll('section:nth-of-type(2) button');
            listItems.forEach(item => {
                item.addEventListener('click', () => {
                    // Remove checkmark from all
                    listItems.forEach(btn => {
                        const check = btn.querySelector('.material-symbols-outlined');
                        if (check) check.remove();
                    });
                    
                    // Add checkmark to clicked
                    const checkSpan = document.createElement('span');
                    checkSpan.className = 'material-symbols-outlined text-primary text-[20px]';
                    checkSpan.style.fontVariationSettings = "'wght' 600";
                    checkSpan.textContent = 'check';
                    item.appendChild(checkSpan);
                    
                    // Update preview text
                    const modeText = item.querySelector('.text-[17px]').textContent;
                    document.querySelector('.text-[13px].text-on-surface.font-medium.text-center').textContent = `当前状态：${modeText}`;
                });
            });
        });
    </script>
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white/90 dark:bg-zinc-800/90 backdrop-blur px-6 py-2.5 rounded-full shadow-lg border border-outline-variant/20 flex items-center gap-2 z-50 animate-bounce">
<span class="material-symbols-outlined text-primary text-[18px]">done</span>
<span class="text-[14px] font-medium text-on-surface">外观已更新</span>
</div></body></html>
