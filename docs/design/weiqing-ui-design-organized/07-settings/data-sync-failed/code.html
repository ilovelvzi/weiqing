<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>微轻 - 数据同步失败</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet">

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed-variant": "#584416",
                    "inverse-primary": "#a6c8ff",
                    "primary-fixed": "#d4e3ff",

                    "outline-variant": "#c2c6d2",
                    "secondary-container": "#bfedd1",
                    "surface": "#f9f9ff",
                    "on-primary-fixed-variant": "#004786",
                    "secondary-fixed": "#bfedd1",
                    "on-tertiary-fixed": "#261900",
                    "on-surface-variant": "#424751",
                    "on-tertiary-container": "#554013",
                    "on-secondary": "#ffffff",
                    "outline": "#727782",
                    "on-primary-fixed": "#001c3a",
                    "surface-tint": "#205fa5",
                    "primary-container": "#7eb3ff",
                    "on-tertiary": "#ffffff",
                    "on-surface": "#151c27",
                    "inverse-surface": "#2a313c",
                    "primary": "#205fa5",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-container": "#436d57",
                    "tertiary": "#725b2b",
                    "inverse-on-surface": "#ebf1ff",
                    "surface-container": "#e7eefe",
                    "secondary-fixed-dim": "#a4d1b6",
                    "on-secondary-fixed": "#002113",
                    "tertiary-fixed": "#fedfa3",
                    "tertiary-container": "#caad75",
                    "surface-dim": "#d3dae9",
                    "surface-container-highest": "#dce3f2",
                    "on-primary": "#ffffff",
                    "on-error-container": "#93000a",
                    "on-secondary-fixed-variant": "#254f3a",
                    "error-container": "#ffdad6",
                    "surface-container-high": "#e2e8f8",
                    "primary-fixed-dim": "#a6c8ff",
                    "surface-bright": "#f9f9ff",
                    "on-error": "#ffffff",
                    "surface-variant": "#dce3f2",
                    "secondary": "#3d6751",
                    "on-primary-container": "#004481",
                    "error": "#ba1a1a",
                    "background": "#f9f9ff",
                    "on-background": "#151c27",
                    "surface-container-low": "#f0f3ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "sm": "12px",
                    "md": "24px",
                    "gutter": "16px",
                    "margin-mobile": "20px",
                    "base": "8px",
                    "xs": "4px",
                    "margin-desktop": "64px",
                    "lg": "40px"
            },
            "fontFamily": {
                    "body-md": [
                            "Manrope"
                    ],
                    "label-sm": [
                            "Manrope"
                    ],
                    "headline-lg": [
                            "Manrope"
                    ],
                    "headline-lg-mobile": [
                            "Manrope"
                    ],
                    "display-num": [
                            "Manrope"
                    ]
            },
            "fontSize": {
                    "body-md": [
                            "16px",

                    ],
                    "label-sm": [
                            "13px",

                                    "lineHeight": "18px",
                                    "letterSpacing": "0.01em",
                                    "fontWeight": "500"

                    ],
                    "headline-lg": [
                            "32px",
                            {
                                    "lineHeight": "40px",
                                    "letterSpacing": "-0.01em",
                                    "fontWeight": "600"

                    ],
                    "headline-lg-mobile": [
                            "28px",

                                    "fontWeight": "600"

                    ],
                    "display-num": [
                            "48px",
                            {
                                    "lineHeight": "56px",
                                    "letterSpacing": "-0.02em",
                                    "fontWeight": "700"

                    ]
            }
    },
        },
      }

<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            -webkit-tap-highlight-color: transparent;
        }
        .ambient-shadow {
            box-shadow: 0 8px 24px rgba(32, 95, 165, 0.06);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-body-md text-body-md">
<!-- Top Navigation (Secondary iOS Style) -->
<header class="fixed top-0 w-full z-50 bg-surface/90 backdrop-blur-md border-b border-outline-variant/10 shadow-sm shadow-primary/5">
<div class="flex justify-between items-center h-16 px-margin-mobile w-full">
<button aria-label="返回" class="flex items-center text-primary active:opacity-70 transition-opacity">
<span class="material-symbols-outlined mr-1" style="font-variation-settings: 'wght' 500;">arrow_back_ios</span>
<span class="font-label-sm text-label-sm">返回</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-on-surface absolute left-1/2 -translate-x-1/2">
                数据同步
            </h1>
<div class="w-[60px]"></div> <!-- Placeholder for balance -->
</div>
</header>
<!-- Main Content -->
<main class="flex-grow pt-24 px-margin-mobile pb-32">
<!-- Status Card (Failure) -->
<div class="bg-surface-container-lowest rounded-xl p-md ambient-shadow border border-error-container/30 mb-md relative overflow-hidden">
<div class="absolute -top-10 -right-10 w-32 h-32 bg-error-container/20 rounded-full blur-2xl"></div>
<div class="flex flex-col items-center text-center space-y-4 relative z-10">
<div class="w-16 h-16 rounded-full bg-error-container flex items-center justify-center">
<span class="material-symbols-outlined text-error text-3xl" data-icon="cloud_off" style="font-variation-settings: 'FILL' 1;">cloud_off</span>
</div>
<div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">部分数据同步失败</h2>
<p class="font-body-md text-body-md text-error">原因：网络不稳定</p>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant bg-surface-container-low px-4 py-2 rounded-lg inline-block mt-2">
                    你的本地记录仍保存在设备上，可以稍后重试
                </p>
</div>
</div>
<!-- Sync Details List -->
<div class="bg-surface-container-lowest rounded-xl ambient-shadow border border-outline-variant/10 mb-md overflow-hidden">
<ul class="divide-y divide-outline-variant/10">
<li class="flex justify-between items-center px-4 py-4">
<div class="flex items-center text-on-surface">
<span class="material-symbols-outlined mr-3 text-outline" data-icon="pending_actions">pending_actions</span>
<span class="font-body-md text-body-md">待同步记录</span>
</div>
<span class="font-body-md text-body-md text-outline">0 条</span>
</li>
<li class="flex justify-between items-center px-4 py-4">
<div class="flex items-center text-on-surface">
<span class="material-symbols-outlined mr-3 text-error" data-icon="error_outline">error_outline</span>
<span class="font-body-md text-body-md">同步失败</span>
</div>
<span class="font-body-md text-body-md text-error font-medium">1 条</span>
</li>
</ul>
</div>
<!-- Settings Group -->
<div class="bg-surface-container-lowest rounded-xl ambient-shadow border border-outline-variant/10 overflow-hidden">
<div class="flex justify-between items-center px-4 py-4">
<div class="flex items-center text-on-surface">
<span class="material-symbols-outlined mr-3 text-primary" data-icon="sync">sync</span>
<span class="font-body-md text-body-md">自动同步</span>
</div>
<!-- iOS Style Toggle Switch (Active) -->
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value="">
<div class="w-11 h-6 bg-outline-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-outline-variant after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest/90 backdrop-blur-md border-t border-outline-variant/10 p-margin-mobile pb-safe z-40">
<button class="w-full bg-primary text-on-primary font-headline-lg-mobile text-headline-lg-mobile py-4 rounded-xl shadow-sm shadow-primary/20 active:scale-[0.98] transition-transform flex justify-center items-center">
<span class="material-symbols-outlined mr-2 text-xl" data-icon="refresh">refresh</span>
            重试同步
        </button>
</div>
</body></html>
