<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>微轻 - 数据同步</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-dim": "#d3dae9",
                        "tertiary-fixed": "#fedfa3",
                        "surface-container-highest": "#dce3f2",
                        "inverse-on-surface": "#ebf1ff",
                        "surface-tint": "#205fa5",
                        "primary": "#205fa5",
                        "secondary-container": "#bfedd1",
                        "tertiary": "#725b2b",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#a4d1b6",
                        "surface-container-low": "#f0f3ff",
                        "on-tertiary-fixed-variant": "#584416",
                        "on-primary-container": "#004481",
                        "background": "#f9f9ff",
                        "on-background": "#151c27",
                        "inverse-primary": "#a6c8ff",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "surface-variant": "#dce3f2",
                        "inverse-surface": "#2a313c",
                        "on-primary-fixed-variant": "#004786",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#e2e8f8",
                        "tertiary-fixed-dim": "#e1c389",
                        "on-secondary-fixed": "#002113",
                        "outline": "#727782",
                        "on-secondary-container": "#436d57",
                        "on-tertiary-fixed": "#261900",
                        "surface-container": "#e7eefe",
                        "secondary": "#3d6751",
                        "error": "#ba1a1a",
                        "surface-bright": "#f9f9ff",
                        "secondary-fixed": "#bfedd1",
                        "on-primary-fixed": "#001c3a",
                        "on-secondary-fixed-variant": "#254f3a",
                        "primary-container": "#7eb3ff",
                        "on-secondary": "#ffffff",
                        "on-tertiary-container": "#554013",
                        "primary-fixed": "#d4e3ff",
                        "outline-variant": "#c2c6d2",
                        "tertiary-container": "#caad75",
                        "on-surface-variant": "#424751",
                        "on-surface": "#151c27",
                        "surface": "#f9f9ff",
                        "primary-fixed-dim": "#a6c8ff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "xs": "4px",
                        "sm": "12px",
                        "gutter": "16px",
                        "md": "24px",
                        "lg": "40px",
                        "margin-mobile": "20px",
                        "margin-desktop": "64px",
                        "base": "8px"
                    },
                    fontFamily: {
                        "label-sm": ["Manrope"],
                        "display-num": ["Manrope"],
                        "body-md": ["Manrope"],
                        "headline-lg": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"]
                    },
                    fontSize: {
                        "label-sm": ["13px", { lineHeight: "18px", letterSpacing: "0.01em", fontWeight: "500" }],
                        "display-num": ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        "headline-lg": ["32px", { lineHeight: "40px", letterSpacing: "-0.01em", fontWeight: "600" }],
                        "headline-lg-mobile": ["28px", { lineHeight: "36px", fontWeight: "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen antialiased selection:bg-primary-container selection:text-on-primary-container">
<header class="fixed top-0 w-full z-50 bg-surface/90 backdrop-blur-md border-b border-outline-variant/10 h-14 flex items-center px-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full text-primary active:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="absolute left-1/2 -translate-x-1/2 font-headline-lg-mobile text-[18px] font-semibold text-on-surface">数据同步</h1>
</header>
<main class="pt-[88px] pb-lg px-margin-mobile md:max-w-[600px] mx-auto">
<section class="bg-surface-container-high rounded-xl p-md shadow-[0_8px_24px_rgba(114,119,130,0.06)] relative overflow-hidden mb-lg border border-outline-variant/20">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-outline-variant to-outline opacity-50"></div>
<div class="flex items-start gap-4 mb-6">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-outline" style="font-variation-settings: 'FILL' 1;">cloud_off</span>
</div>
<div>
<h2 class="font-body-md text-body-md font-bold mb-1">账号处于注销冷静期，数据同步已停止</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant">你的历史数据仍被安全保存，注销完成前可以导出数据或恢复账号。</p>
</div>
</div>
<div class="grid grid-cols-2 gap-3">
<div class="bg-surface/60 rounded-lg p-3 border border-outline-variant/10">
<div class="font-label-sm text-label-sm text-outline mb-1">数据状态</div>
<div class="flex items-center gap-1.5 font-body-md text-body-md font-medium text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">lock</span>
                        已锁定
                    </div>
</div>
<div class="bg-surface/60 rounded-lg p-3 border border-outline-variant/10">
<div class="font-label-sm text-label-sm text-outline mb-1">同步状态</div>
<div class="flex items-center gap-1.5 font-body-md text-body-md font-medium text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">sync_disabled</span>
                        已停止
                    </div>
</div>
</div>
</section>
<section class="bg-surface-container-lowest rounded-xl p-2 shadow-[0_4px_16px_rgba(32,95,165,0.02)] mb-lg opacity-50 select-none border border-outline-variant/10">
<div class="flex justify-between items-center p-3">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-outline">cloud_sync</span>
</div>
<div>
<div class="font-body-md text-body-md font-medium">自动同步</div>
<div class="font-label-sm text-label-sm text-outline mt-0.5">已停止</div>
</div>
</div>
<div class="w-12 h-6 bg-surface-variant rounded-full relative cursor-not-allowed">
<div class="w-5 h-5 bg-surface rounded-full absolute left-0.5 top-0.5 shadow-sm"></div>
</div>
</div>
</section>
<section class="flex flex-col gap-3 mt-lg"><button class="w-full bg-surface-container-high text-on-surface-variant font-body-md text-body-md py-4 rounded-xl flex justify-center items-center gap-2 hover:bg-surface-container-highest transition-colors font-medium border border-outline-variant/10">
<span class="material-symbols-outlined">download</span>
    导出数据
</button>
<button class="w-full bg-primary text-on-primary font-body-md text-body-md py-4 rounded-xl flex justify-center items-center gap-2 shadow-sm shadow-primary/20 hover:bg-primary/90 transition-colors font-medium">
<span class="material-symbols-outlined">settings_backup_restore</span>
    恢复账号
</button></section>
</main>
</body></html>
