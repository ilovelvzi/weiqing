<!DOCTYPE html><html class="light" lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport">
<title>记录腰围 Bottom Sheet</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#001c3a",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#a4d1b6",
                        "on-background": "#151c27",
                        "primary-fixed": "#d4e3ff",
                        "on-primary-container": "#004481",
                        "inverse-surface": "#2a313c",
                        "inverse-primary": "#a6c8ff",
                        "on-primary-fixed-variant": "#004786",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#e2e8f8",
                        "tertiary": "#725b2b",
                        "on-secondary-fixed": "#002113",
                        "tertiary-fixed-dim": "#e1c389",
                        "primary-container": "#7eb3ff",
                        "on-tertiary-fixed": "#261900",
                        "on-tertiary-container": "#554013",
                        "on-error-container": "#93000a",
                        "surface-container-highest": "#dce3f2",
                        "outline": "#727782",
                        "surface-variant": "#dce3f2",
                        "background": "#f9f9ff",
                        "on-tertiary-fixed-variant": "#584416",
                        "secondary-container": "#bfedd1",
                        "on-primary": "#ffffff",
                        "outline-variant": "#c2c6d2",
                        "on-secondary-container": "#436d57",
                        "secondary": "#3d6751",
                        "surface-bright": "#f9f9ff",
                        "tertiary-fixed": "#fedfa3",
                        "surface-container": "#e7eefe",
                        "surface": "#f9f9ff",
                        "on-secondary-fixed-variant": "#254f3a",
                        "tertiary-container": "#caad75",
                        "primary": "#205fa5",
                        "surface-dim": "#d3dae9",
                        "primary-fixed-dim": "#a6c8ff",
                        "on-surface-variant": "#424751",
                        "on-error": "#ffffff",
                        "error": "#ba1a1a",
                        "on-surface": "#151c27",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f0f3ff",
                        "surface-tint": "#205fa5",
                        "inverse-on-surface": "#ebf1ff",
                        "secondary-fixed": "#bfedd1"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "20px",
                        "xs": "4px",
                        "margin-desktop": "64px",
                        "lg": "40px",
                        "md": "24px",
                        "base": "8px",
                        "sm": "12px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Manrope"],
                        "display-num": ["Manrope"],
                        "label-sm": ["Manrope"],
                        "body-md": ["Manrope"],
                        "headline-lg": ["Manrope"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "display-num": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["13px", { "lineHeight": "18px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Custom utilities to complement tailwind */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        .ios-sheet-enter {
            animation: slideUp 0.4s cubic-bezier(0.32, 0.72, 0, 1) forwards;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-surface-container antialiased h-screen w-screen overflow-hidden flex justify-center items-end md:items-center relative">
<!-- Mock Background App Content (to show overlay effect) -->
<div class="absolute inset-0 z-0 flex flex-col p-margin-mobile">
<div class="w-full h-48 bg-surface-container-high rounded-xl mb-4 animate-pulse"></div>
<div class="w-full h-32 bg-surface-container-high rounded-xl mb-4 animate-pulse"></div>
<div class="w-full h-32 bg-surface-container-high rounded-xl animate-pulse"></div>
</div>
<!-- Bottom Sheet Overlay / Backdrop -->
<div class="fixed inset-0 z-40 bg-on-surface/30 backdrop-blur-sm transition-opacity duration-300"></div>
<!-- Bottom Sheet Container (Mobile standard, constrained max-width for desktop preview) -->
<div class="z-50 w-full max-w-md bg-surface-container-lowest rounded-t-[32px] pt-sm px-margin-mobile pb-[calc(env(safe-area-inset-bottom,32px)+16px)] shadow-[0_-8px_40px_rgba(0,0,0,0.08)] ios-sheet-enter relative">
<!-- Drag Handle -->
<div class="w-10 h-1.5 bg-outline-variant/60 rounded-full mx-auto mb-5"></div>
<!-- Header -->
<div class="flex items-center justify-center mb-10 relative">
<h2 class="font-body-md text-body-md font-semibold text-on-surface">记录腰围</h2>
</div>
<!-- Main Input Area -->
<div class="flex flex-col items-center justify-center mb-12">
<!-- Number Input Group -->
<div class="flex items-baseline justify-center border-b-2 border-primary/20 pb-xs px-md min-w-[220px] transition-colors focus-within:border-primary">
<input class="w-[120px] text-center bg-transparent border-none focus:ring-0 p-0 font-display-num text-display-num text-on-surface appearance-none outline-none caret-primary" placeholder="0.0" type="number" value="72.0">
<span class="font-body-md text-body-md text-on-surface-variant ml-xs relative -top-1">cm</span>
</div>
<!-- Helper Text -->
<p class="mt-4 font-label-sm text-label-sm text-outline">合法范围：10 - 300 cm</p>
</div>
<!-- Action Area -->
<div class="w-full mt-auto">
<button class="w-full bg-primary text-on-primary font-body-md text-body-md font-semibold py-[16px] rounded-full active:scale-[0.98] active:bg-primary/90 transition-all shadow-sm flex items-center justify-center min-h-[56px]">
                完成
            </button>
</div>
</div>
</body></html>
