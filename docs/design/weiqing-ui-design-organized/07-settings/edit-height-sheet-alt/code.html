<style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }
        
        /* Smooth reveal animation for bottom sheet */
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-slide-up {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        
        /* Input focus effects */
        .glass-input-container:focus-within {
            box-shadow: 0 0 0 1px theme('colors.primary');
            background-color: theme('colors.surface');
        }
    </style>

<body class="bg-outline/20 font-body-md text-on-surface antialiased h-screen w-screen overflow-hidden flex flex-col justify-end">
<!-- Overlay backdrop -->
<div aria-hidden="true" class="fixed inset-0 bg-on-surface/40 backdrop-blur-[2px] animate-fade-in z-40" onclick="closeSheet()"></div>
<!-- Bottom Sheet Container -->
<div class="relative z-50 bg-surface w-full rounded-t-[32px] shadow-[0_-8px_32px_rgba(0,28,58,0.1)] flex flex-col animate-slide-up pb-safe" id="bottom-sheet">
<!-- Drag Handle Indicator -->
<div class="w-full flex justify-center pt-4 pb-2 cursor-grab active:cursor-grabbing" id="drag-handle">
<div class="w-12 h-1.5 bg-outline-variant/60 rounded-full"></div>
</div>
<!-- Header -->
<div class="px-margin-mobile pb-6 pt-2 flex items-center justify-between">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface w-full text-center">修改身高</h2>
<!-- Invisible placeholder to balance the absolute centering if needed, or close button -->
<button aria-label="关闭" class="absolute right-margin-mobile top-6 p-2 rounded-full hover:bg-surface-container-high transition-colors text-outline" onclick="closeSheet()">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Content Area -->
<div class="px-margin-mobile flex flex-col items-center gap-2 mb-lg">
<!-- Number Input Area -->
<div class="w-full flex items-end justify-center gap-xs glass-input-container bg-surface-container-high/50 rounded-xl p-md transition-all duration-200">
<input aria-label="身高数值" class="bg-transparent border-none outline-none font-display-num text-display-num text-on-surface w-24 text-center p-0 m-0 focus:ring-0 appearance-none" style="-moz-appearance: textfield;" type="number" value="170">
<span class="font-body-md text-body-md text-outline pb-1">cm</span>
</div>
<!-- Helper Text -->
<p class="font-label-sm text-label-sm text-outline mt-xs">合法范围：30 - 250 cm</p>
</div>
<!-- Action Area -->
<div class="px-margin-mobile pb-md pt-sm w-full">
<button class="w-full bg-primary text-on-primary font-body-md text-body-md font-semibold h-[56px] rounded-full shadow-sm shadow-primary/20 active:scale-[0.98] transition-transform duration-200 flex items-center justify-center hover:bg-primary/90 min-h-[44px]">
                完成
            </button>
</div>
</div>
<script>
        // Simple drag to close logic (visual demo)
        const sheet = document.getElementById('bottom-sheet');
        const handle = document.getElementById('drag-handle');
        let startY = 0;
        let currentY = 0;

        handle.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
            sheet.style.transition = 'none';
        });

        handle.addEventListener('touchmove', (e) => {
            currentY = e.touches[0].clientY;
            const deltaY = currentY - startY;
            if (deltaY > 0) {
                sheet.style.transform = `translateY(${deltaY}px)`;
            }
        });

        handle.addEventListener('touchend', (e) => {
            const deltaY = currentY - startY;
            sheet.style.transition = 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)';
            if (deltaY > 100) {
                closeSheet();
            } else {
                sheet.style.transform = 'translateY(0)';
            }
        });

        function closeSheet() {
            sheet.style.transform = 'translateY(100%)';
            setTimeout(() => {
                // In a real app, this would dismiss the view
                sheet.style.transform = 'translateY(0)'; // Reset for demo purposes
            }, 300);
        }
    </script>
</body></html>
