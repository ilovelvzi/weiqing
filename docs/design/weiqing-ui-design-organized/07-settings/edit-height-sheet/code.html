<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* iOS Picker Simulator Styles */
        .picker-container {
            position: relative;
            height: 200px;
            overflow: hidden;
            mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent);
        }
        
        .picker-wheel {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            transform-style: preserve-3d;
            transition: transform 0.1s;
        }
        
        .picker-item {
            position: absolute;
            left: 0;
            right: 0;
            height: 34px; /* Standard iOS picker item height */
            line-height: 34px;
            text-align: center;
            transform-origin: 50% 50% -100px; /* Radius of the wheel */
            backface-visibility: hidden;
            color: #151c27; /* on-surface */
            opacity: 0.3;
            transition: opacity 0.2s, font-weight 0.2s;
        }
        
        .picker-item.active {
            opacity: 1;
            font-weight: 600;
        }

        /* Selection highlight band */
        .picker-highlight {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 34px;
            background-color: rgba(118, 118, 128, 0.12); /* Standard iOS gray background for picker highlight */
            border-radius: 8px;
            z-index: -1;
            pointer-events: none;
        }

        /* Bottom Sheet Animation */
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .bottom-sheet {
            animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1) forwards;
        }
    </style>

<body class="bg-surface-variant min-h-screen flex items-end justify-center font-body-md text-on-surface antialiased overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Overlay backdrop -->
<div class="fixed inset-0 bg-on-surface/40 backdrop-blur-sm z-40 transition-opacity" id="backdrop"></div>
<!-- Bottom Sheet Container -->
<div class="bottom-sheet bg-surface w-full max-w-md rounded-t-[32px] z-50 pb-safe shadow-[0_-8px_32px_rgba(32,95,165,0.08)] flex flex-col items-center">
<!-- Drag Handle (iOS style) -->
<div class="w-full flex justify-center pt-4 pb-2">

<div class="w-8"></div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight text-center flex-1">编辑身高</h2>
<!-- Close icon placeholder for balance, or act as actual close if needed -->
<button aria-label="关闭" class="w-8 h-8 rounded-full bg-surface-container flex items-center justify-center text-outline active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px]" data-icon="close">close</span>
</button>
</div>
<!-- Picker Area -->
<div class="w-full px-margin-mobile mb-8">
<div class="relative bg-surface-container-lowest rounded-2xl p-4 shadow-sm shadow-primary/5 border border-outline-variant/10">
<div class="picker-container w-full" id="picker-container">
<div class="picker-highlight"></div>
<div class="picker-wheel" id="picker-wheel">
<!-- Items injected by JS -->
</div>
<!-- Unit Label positioned to the right of the highlight -->
<div class="absolute top-1/2 left-1/2 ml-[35px] -translate-y-1/2 font-body-md text-body-md text-outline font-medium pointer-events-none">
                        cm
                    </div>
</div>
</div>
</div>
<!-- Action Button -->
<div class="w-full px-margin-mobile pb-8 pt-2">
<button class="w-full h-[56px] bg-primary text-on-primary rounded-full font-headline-lg-mobile text-[18px] font-semibold tracking-wide flex items-center justify-center active:scale-[0.98] active:bg-primary/90 transition-all shadow-md shadow-primary/20">
                完成
            </button>
</div>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const wheel = document.getElementById('picker-wheel');
            const container = document.getElementById('picker-container');
            
            const minHeight = 30;
            const maxHeight = 250;
            const defaultHeight = 170;
            const itemHeight = 34; // standard iOS picker item height
            const radius = 100; // approximate radius of the wheel cylinder

            let items = [];
            let currentSelectedIndex = defaultHeight - minHeight;
            let isDragging = false;
            let startY = 0;
            let currentRotation = 0;
            let targetRotation = 0;
            let velocity = 0;
            let lastY = 0;
            let lastTime = 0;
            let animationFrame;

            // Initialize wheel items
            for (let i = minHeight; i <= maxHeight; i++) {
                const el = document.createElement('div');
                el.className = 'picker-item font-display-num text-[24px]'; // Using display-num font for numbers
                el.innerText = i;
                wheel.appendChild(el);
                items.push(el);
            }

            function updateWheel() {
                // Calculate which item should be selected based on rotation
                const anglePerItem = itemHeight / radius;
                const index = Math.round(-currentRotation / anglePerItem);
                
                // Clamp index
                const clampedIndex = Math.max(0, Math.min(items.length - 1, index));
                
                // If stopped or snapping, adjust rotation exactly to clamped index
                if (!isDragging && Math.abs(velocity) < 0.01) {
                     targetRotation = -clampedIndex * anglePerItem;
                     currentRotation += (targetRotation - currentRotation) * 0.2; // ease into snap
                }

                // Apply transforms
                items.forEach((item, i) => {
                    const angle = currentRotation + (i * anglePerItem);
                    // Hide items completely behind the wheel
                    if (Math.abs(angle) > Math.PI / 2) {
                        item.style.visibility = 'hidden';
                    } else {
                        item.style.visibility = 'visible';
                        item.style.transform = `rotateX(${angle}rad) translateZ(${radius}px)`;
                        
                        // Update active state
                        if (i === clampedIndex) {
                            item.classList.add('active');
                            item.style.color = '#205fa5'; // Highlight active number with primary color
                        } else {
                            item.classList.remove('active');
                            item.style.color = '#151c27'; // Reset
                        }
                    }
                });

                if (!isDragging && Math.abs(velocity) > 0.001) {
                    currentRotation += velocity;
                    velocity *= 0.95; // friction
                    
                    // Boundary bouncing
                    const maxRotation = 0;
                    const minRotation = -(items.length - 1) * anglePerItem;
                    
                    if (currentRotation > maxRotation) {
                        velocity -= (currentRotation - maxRotation) * 0.1;
                        velocity *= 0.8; // extra dampening at boundaries
                    } else if (currentRotation < minRotation) {
                        velocity -= (currentRotation - minRotation) * 0.1;
                        velocity *= 0.8;
                    }
                }

                animationFrame = requestAnimationFrame(updateWheel);
            }

            // Set initial rotation
            const initialAnglePerItem = itemHeight / radius;
            currentRotation = -currentSelectedIndex * initialAnglePerItem;
            updateWheel();

            // Touch / Mouse events for dragging
            container.addEventListener('touchstart', handleStart, { passive: false });
            container.addEventListener('touchmove', handleMove, { passive: false });
            container.addEventListener('touchend', handleEnd);
            container.addEventListener('mousedown', handleStart);
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('mouseup', handleEnd);

            function handleStart(e) {
                if(e.type === 'mousedown' && e.button !== 0) return;
                isDragging = true;
                startY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                lastY = startY;
                lastTime = performance.now();
                velocity = 0;
                e.preventDefault(); // Prevent scrolling the page
            }

            function handleMove(e) {
                if (!isDragging) return;
                const currentY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                const deltaY = currentY - lastY;
                const currentTime = performance.now();
                const deltaTime = currentTime - lastTime;
                
                // Convert pixel movement to rotation (approximate)
                const deltaRotation = deltaY / radius;
                currentRotation += deltaRotation;

                if (deltaTime > 0) {
                    velocity = deltaRotation / (deltaTime / 16); // normalize to roughly 60fps
                }

                lastY = currentY;
                lastTime = currentTime;
                e.preventDefault();
            }

            function handleEnd() {
                if (!isDragging) return;
                isDragging = false;
                
                // Give it a little flick velocity
                if (Math.abs(velocity) > 0.5) {
                    velocity = Math.sign(velocity) * 0.5; // cap velocity
                }
            }

            // Optional: close on backdrop click
            document.getElementById('backdrop').addEventListener('click', () => {
                // In a real app, this would trigger closing animation and remove from DOM
                console.log('Close bottom sheet requested');
            });
        });
    </script>
