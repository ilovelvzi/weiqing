<!DOCTYPE html><html class="light" lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>编辑昵称 - 底部面板</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-container": "#bfedd1",
                        "on-primary": "#ffffff",
                        "outline-variant": "#c2c6d2",
                        "on-secondary-container": "#436d57",
                        "surface-variant": "#dce3f2",
                        "on-tertiary-fixed-variant": "#584416",
                        "background": "#f9f9ff",
                        "surface-container": "#e7eefe",
                        "surface": "#f9f9ff",
                        "surface-bright": "#f9f9ff",
                        "secondary": "#3d6751",
                        "tertiary-fixed": "#fedfa3",
                        "surface-dim": "#d3dae9",
                        "primary-fixed-dim": "#a6c8ff",
                        "on-surface-variant": "#424751",
                        "on-error": "#ffffff",
                        "on-secondary-fixed-variant": "#254f3a",
                        "primary": "#205fa5",
                        "tertiary-container": "#caad75",
                        "surface-tint": "#205fa5",
                        "inverse-on-surface": "#ebf1ff",
                        "secondary-fixed": "#bfedd1",
                        "on-surface": "#151c27",
                        "on-secondary": "#ffffff",
                        "error": "#ba1a1a",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f0f3ff",
                        "primary-fixed": "#d4e3ff",
                        "on-primary-container": "#004481",
                        "inverse-surface": "#2a313c",
                        "inverse-primary": "#a6c8ff",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed": "#001c3a",
                        "on-background": "#151c27",
                        "secondary-fixed-dim": "#a4d1b6",
                        "on-primary-fixed-variant": "#004786",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#e2e8f8",
                        "tertiary-fixed-dim": "#e1c389",
                        "primary-container": "#7eb3ff",
                        "on-tertiary-fixed": "#261900",
                        "on-tertiary-container": "#554013",
                        "on-error-container": "#93000a",
                        "tertiary": "#725b2b",
                        "on-secondary-fixed": "#002113",
                        "surface-container-highest": "#dce3f2",
                        "outline": "#727782"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "20px",
                        "lg": "40px",
                        "xs": "4px",
                        "margin-desktop": "64px",
                        "base": "8px",
                        "md": "24px",
                        "sm": "12px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Manrope"],
                        "label-sm": ["Manrope"],
                        "body-md": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"],
                        "display-num": ["Manrope"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-sm": ["13px", { "lineHeight": "18px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "display-num": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Bottom Sheet Animation */
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-slide-up {
            animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1) forwards;
        }
        .animate-fade-in {
            animation: fadeIn 0.2s ease-out forwards;
        }
    </style>
</head>
<body class="bg-surface-dim h-screen w-full flex items-end md:items-center justify-center font-body-md text-on-surface overflow-hidden">
<!-- Scrim / Backdrop -->
<div class="fixed inset-0 bg-on-surface/40 backdrop-blur-sm animate-fade-in z-40" id="backdrop"></div>
<!-- Bottom Sheet Container (Mobile) / Modal (Desktop) -->
<div class="w-full md:max-w-md bg-surface-container-lowest rounded-t-[32px] md:rounded-[32px] shadow-[0_-8px_32px_rgba(32,95,165,0.08)] z-50 animate-slide-up relative flex flex-col pb-safe">
<!-- Drag Handle (iOS Style) -->
<div class="w-full pt-4 pb-2 flex justify-center items-center cursor-grab active:cursor-grabbing" id="drag-handle">
<div class="w-10 h-1.5 bg-outline-variant/50 rounded-full"></div>
</div>
<!-- Header -->
<div class="px-margin-mobile pb-md pt-2 flex justify-between items-center border-b border-outline-variant/10">
<button aria-label="Cancel" class="w-11 h-11 flex items-center justify-start text-on-surface-variant hover:text-on-surface transition-colors">
<span class="font-label-sm text-label-sm">取消</span>
</button>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile !text-[18px] !leading-[24px] font-bold text-on-surface">编辑昵称</h2>
<div class="w-11"></div> <!-- Spacer for centering -->
</div>
<!-- Content Body -->
<div class="p-margin-mobile flex-grow flex flex-col gap-base">
<!-- Input Field Group -->
<div class="relative w-full group">
<input autocomplete="off" class="w-full h-[56px] px-sm bg-surface-container-low border border-transparent rounded-xl font-body-md text-body-md text-on-surface focus:outline-none focus:bg-surface-container-lowest focus:border-primary/30 focus:shadow-[0_0_0_1px_rgba(32,95,165,0.3)] transition-all duration-200 placeholder:text-outline" id="nickname-input" placeholder="请输入昵称" type="text" value="林雨辉">
<!-- Clear Button (visible when input has value, though logic handled via JS) -->
<button aria-label="Clear input" class="absolute right-xs top-1/2 -translate-y-1/2 w-11 h-11 flex items-center justify-center text-outline-variant hover:text-outline transition-colors" id="clear-btn">
<span class="material-symbols-outlined fill text-[20px]">cancel</span>
</button>
</div>
<!-- Helper Text -->
<p class="font-label-sm text-label-sm text-outline px-xs">2 - 20 个字符</p>
<div class="mt-lg"></div> <!-- Spacing before action -->
<!-- Action Button -->
<button class="w-full h-[56px] bg-primary text-on-primary rounded-full font-headline-lg-mobile text-headline-lg-mobile !text-[16px] !leading-[24px] font-bold shadow-sm shadow-primary/20 hover:bg-primary/90 hover:shadow-primary/30 active:scale-[0.98] transition-all duration-200 flex items-center justify-center">
                完成
            </button>
</div>
</div>
<!-- Safe Area Bottom Padding for iOS -->
<style>
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
    </style>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('nickname-input');
            const clearBtn = document.getElementById('clear-btn');
            const backdrop = document.getElementById('backdrop');

            // Handle clear button visibility and action
            const toggleClearBtn = () => {
                clearBtn.style.opacity = input.value.length > 0 ? '1' : '0';
                clearBtn.style.pointerEvents = input.value.length > 0 ? 'auto' : 'none';
            };

            input.addEventListener('input', toggleClearBtn);
            
            clearBtn.addEventListener('click', () => {
                input.value = '';
                toggleClearBtn();
                input.focus();
            });

            // Initial state
            toggleClearBtn();

            // Simulate dismiss on backdrop click
            backdrop.addEventListener('click', () => {
                // In a real app, this would trigger the close animation and remove from DOM
                console.log('Dismiss requested');
            });
        });
    </script>
</body></html>
