<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>选择提醒时间 - 底部抽屉</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",

                extend: {
                    colors: {
                        "inverse-surface": "#2a313c",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "#f0f3ff",
                        "surface": "#f9f9ff",

                        "inverse-primary": "#a6c8ff",
                        "on-tertiary-fixed-variant": "#584416",
                        "on-primary-fixed-variant": "#004786",
                        "on-background": "#151c27",
                        "on-error": "#ffffff",
                        "surface-container": "#e7eefe",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#a4d1b6",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "on-primary-fixed": "#001c3a",
                        "inverse-on-surface": "#ebf1ff",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f9f9ff",
                        "tertiary-fixed-dim": "#e1c389",
                        "primary-container": "#7eb3ff",
                        "background": "#f9f9ff",
                        "tertiary": "#725b2b",
                        "primary-fixed-dim": "#a6c8ff",
                        "secondary-fixed": "#bfedd1",
                        "surface-dim": "#d3dae9",
                        "outline-variant": "#c2c6d2",
                        "on-surface": "#151c27",
                        "on-secondary-container": "#436d57",
                        "surface-container-highest": "#dce3f2",
                        "primary-fixed": "#d4e3ff",
                        "on-surface-variant": "#424751",
                        "secondary-container": "#bfedd1",
                        "surface-variant": "#dce3f2",
                        "on-tertiary-fixed": "#261900",
                        "surface-container-high": "#e2e8f8",
                        "on-tertiary-container": "#554013",
                        "secondary": "#3d6751",
                        "primary": "#205fa5",
                        "on-secondary-fixed": "#002113",
                        "on-secondary-fixed-variant": "#254f3a",
                        "on-error-container": "#93000a",
                        "surface-tint": "#205fa5",
                        "tertiary-container": "#caad75",
                        "on-primary-container": "#004481"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "lg": "40px",
                        "gutter": "16px",
                        "xs": "4px",
                        "md": "24px",
                        "margin-desktop": "64px",
                        "margin-mobile": "20px",
                        "sm": "12px",
                        "base": "8px"
                    },
                    fontFamily: {
                        "label-sm": ["Manrope"],
                        "headline-lg": ["Manrope"],
                        "body-md": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"],
                        "display-num": ["Manrope"]
                    },
                    fontSize: {
                        "label-sm": ["13px", { lineHeight: "18px", letterSpacing: "0.01em", fontWeight: "500" }],
                        "headline-lg": ["32px", { lineHeight: "40px", letterSpacing: "-0.01em", fontWeight: "600" }],
                        "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        "headline-lg-mobile": ["28px", { lineHeight: "36px", fontWeight: "600" }],
                        "display-num": ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "700" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Custom mask for the picker wheel to create iOS cylinder fade effect */
        .picker-mask {
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 30%, black 70%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 30%, black 70%, transparent 100%);
        }
        
        /* 3D Transform utilities for static visual representation */
        .rotate-x-15 { transform: perspective(200px) rotateX(15deg) scale(0.9); }
        .rotate-x-30 { transform: perspective(200px) rotateX(30deg) scale(0.8); }
        .-rotate-x-15 { transform: perspective(200px) rotateX(-15deg) scale(0.9); }
        .-rotate-x-30 { transform: perspective(200px) rotateX(-30deg) scale(0.8); }

        /* Animation for demo purposes */
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-background min-h-screen text-on-surface font-sans selection:bg-primary/20">
<!-- Background Context (Reminder Settings Page) -->
<div class="relative min-h-screen z-0 overflow-hidden">
<!-- TopAppBar (from JSON) -->
<header class="fixed top-0 w-full z-10 bg-background/80 backdrop-blur-xl flex items-center h-14 px-margin-mobile shadow-sm">
<button class="w-10 h-10 flex items-center justify-start text-primary active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-2xl" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-semibold text-on-surface flex-1">提醒设置</h1>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 px-margin-mobile pb-32 flex flex-col gap-sm">
<!-- Dummy Setting Cards to show context -->
<div class="bg-surface-container-lowest p-md rounded-xl shadow-[0_4px_20px_0_rgba(0,0,0,0.03)] flex justify-between items-center border border-outline-variant/10">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="water_drop">water_drop</span>
</div>
<span class="font-body-md text-body-md font-semibold">喝水提醒</span>
</div>
<div class="flex items-center gap-xs">
<span class="font-display-num text-[24px] font-semibold text-primary">08:00</span>
<span class="material-symbols-outlined text-outline-variant text-sm" data-icon="chevron_right">chevron_right</span>
</div>
</div>
<div class="bg-surface-container-lowest p-md rounded-xl shadow-[0_4px_20px_0_rgba(0,0,0,0.03)] flex justify-between items-center border border-outline-variant/10">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="directions_walk">directions_walk</span>
</div>
<span class="font-body-md text-body-md font-semibold">散步提醒</span>
</div>
<div class="flex items-center gap-xs">
<span class="font-display-num text-[24px] font-semibold text-primary">18:30</span>
<span class="material-symbols-outlined text-outline-variant text-sm" data-icon="chevron_right">chevron_right</span>
</div>
</div>
</main>
</div>
<!-- Modals Layer -->
<div class="relative z-50">
<!-- Backdrop -->
<div aria-hidden="true" class="fixed inset-0 bg-on-surface/30 backdrop-blur-sm animate-fade-in transition-opacity"></div>
<!-- Bottom Sheet container -->
<div class="fixed bottom-0 left-0 right-0 transform translate-y-full animate-slide-up flex flex-col items-center">
<!-- Sheet Surface -->
<!-- Note: using arbitrary class rounded-t-[32px] specifically to meet the "Large rounded corners" (大圆角) iOS requirement as 'xl' in config is only 12px -->
<div class="w-full max-w-[600px] bg-surface-container-lowest rounded-t-[32px] shadow-[0_-12px_40px_rgba(0,0,0,0.08)] flex flex-col pt-sm pb-8 relative overflow-hidden border-t border-outline-variant/10">
<!-- Drag Handle -->
<div aria-hidden="true" class="w-full flex justify-center pb-sm pt-xs">
<div class="w-12 h-1.5 bg-outline-variant/40 rounded-full"></div>
</div>
<!-- Header -->
<div class="w-full px-margin-mobile pb-md flex justify-center items-center relative">
<h2 class="font-headline-lg-mobile text-[22px] font-semibold text-on-surface tracking-tight">选择提醒时间</h2>
</div>
<!-- iOS Time Picker Area -->
<div class="relative h-[240px] w-full px-margin-mobile flex justify-center items-center bg-surface-bright picker-mask">
<!-- Highlight Selection Band (Static Background) -->
<div class="absolute top-1/2 left-margin-mobile right-margin-mobile h-[48px] -translate-y-1/2 bg-surface-container-low/80 rounded-xl pointer-events-none border border-primary/5"></div>
<!-- Picker Wheels Container -->
<div class="flex w-full max-w-[300px] h-full relative z-10">
<!-- Hours Wheel -->
<div class="flex-1 flex flex-col items-center justify-center cursor-ns-resize touch-pan-y">
<div class="h-10 flex items-center justify-center font-display-num text-[28px] text-outline opacity-20 rotate-x-30 transition-all">06</div>
<div class="h-10 flex items-center justify-center font-display-num text-[32px] text-on-surface-variant opacity-60 rotate-x-15 transition-all">07</div>
<!-- Active Item -->
<div class="h-[48px] flex items-center justify-center font-display-num text-display-num text-primary font-bold transition-all transform scale-110">08</div>
<div class="h-10 flex items-center justify-center font-display-num text-[32px] text-on-surface-variant opacity-60 -rotate-x-15 transition-all">09</div>
<div class="h-10 flex items-center justify-center font-display-num text-[28px] text-outline opacity-20 -rotate-x-30 transition-all">10</div>
</div>
<!-- Colon Separator -->
<div class="w-10 flex items-center justify-center font-display-num text-[40px] text-on-surface-variant pb-1 font-medium z-20">
                            :
                        </div>
<!-- Minutes Wheel -->
<div class="flex-1 flex flex-col items-center justify-center cursor-ns-resize touch-pan-y">
<div class="h-10 flex items-center justify-center font-display-num text-[28px] text-outline opacity-20 rotate-x-30 transition-all">28</div>
<div class="h-10 flex items-center justify-center font-display-num text-[32px] text-on-surface-variant opacity-60 rotate-x-15 transition-all">29</div>
<!-- Active Item -->
<div class="h-[48px] flex items-center justify-center font-display-num text-display-num text-primary font-bold transition-all transform scale-110">30</div>
<div class="h-10 flex items-center justify-center font-display-num text-[32px] text-on-surface-variant opacity-60 -rotate-x-15 transition-all">31</div>
<div class="h-10 flex items-center justify-center font-display-num text-[28px] text-outline opacity-20 -rotate-x-30 transition-all">32</div>
</div>
</div>
</div>
<!-- Action Button Area -->
<div class="px-margin-mobile pt-md mt-sm">
<!-- High touch target area (56px) for iOS comfort -->
<button class="w-full h-[56px] rounded-full bg-primary text-on-primary font-body-md text-[18px] font-semibold tracking-wide active:scale-[0.97] transition-transform duration-200 shadow-[0_8px_16px_-6px_rgba(32,95,165,0.4)] flex items-center justify-center hover:bg-primary-container hover:text-on-primary-container">
                        完成
                    </button>
</div>
</div>
</div>
</div>
</body></html>
