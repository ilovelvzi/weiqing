<style>body { font-family: 'Manrope', sans-serif; background-color: #f9f9ff; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        /* Refined iOS Switch */
        .apple-switch {
            appearance: none;
            -webkit-appearance: none;
            width: 51px;
            height: 31px;
            border-radius: 31px;
            background-color: #E9E9EA;
            position: relative;
            outline: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
            border: 0;
        }
        .apple-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 27px;
            height: 27px;
            border-radius: 50%;
            background-color: white;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15), 0 1px 1px rgba(0,0,0,0.16);
            transition: transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .apple-switch:checked {
            background-color: #205fa5; /* Blue */
        }
        .apple-switch:checked::after {
            transform: translateX(20px);
        }
        .apple-switch:focus-visible {
            box-shadow: 0 0 0 2px rgba(32, 95, 165, 0.4);
        }

        ::-webkit-scrollbar { display: none; }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const textarea = document.querySelector('textarea');
        const submitBtn = document.getElementById('submit-btn');
        
        textarea.addEventListener('input', (e) => {
            if (e.target.value.trim().length > 0) {
                submitBtn.disabled = false;
                submitBtn.classList.remove('bg-outline-variant', 'opacity-50', 'cursor-not-allowed');
                submitBtn.classList.add('bg-primary');
            } else {
                submitBtn.disabled = true;
                submitBtn.classList.add('bg-outline-variant', 'opacity-50', 'cursor-not-allowed');
                submitBtn.classList.remove('bg-primary');
            }
        });

        submitBtn.addEventListener('click', () => {
            const originalText = submitBtn.innerText;
            submitBtn.innerText = '提交中...';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70');

            setTimeout(() => {
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70');
                
                const toast = document.getElementById('status-toast');
                toast.classList.remove('opacity-0');
                setTimeout(() => toast.classList.add('opacity-0'), 2000);
            }, 1500);
        });
    });
</script></head>
<body class="bg-surface text-on-surface h-screen w-full overflow-hidden relative">
<!-- Mock Homepage Background (Blurred) -->
<div class="absolute inset-0 z-0 bg-surface-bright flex flex-col items-center pt-20 px-margin-mobile">
<div class="w-full h-40 bg-surface-container rounded-2xl mb-4 opacity-50"></div>
<div class="w-full h-24 bg-surface-container rounded-2xl mb-4 opacity-50"></div>
<div class="w-full h-64 bg-surface-container rounded-2xl opacity-50"></div>
</div>
<!-- Backdrop Overlay -->
<div class="absolute inset-0 z-40 bg-on-surface/40 backdrop-blur-sm transition-opacity"></div>
<!-- Bottom Sheet -->
<div class="absolute bottom-0 left-0 right-0 z-50 bg-surface rounded-t-3xl shadow-airy flex flex-col max-h-[795px] transition-transform duration-300 transform translate-y-0">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-3 pb-2 cursor-grab">
<div class="w-10 h-1.5 bg-outline-variant/50 rounded-full"></div>
</div>
<!-- Header -->
<div class="px-margin-mobile pb-4">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface font-semibold">意见反馈</h2>
</div>
<!-- Scrollable Content -->
<div class="overflow-y-auto px-margin-mobile pb-8 flex flex-col gap-md">
<!-- 1. Feedback Type (Chips) -->
<div class="flex flex-col gap-base">
<span class="font-label-sm text-label-sm text-on-surface-variant">反馈类型</span>
<div class="flex flex-wrap gap-sm">
<button class="px-4 py-2 rounded-full font-label-sm text-label-sm bg-primary/10 text-primary border border-primary/20 transition-colors">
                        功能建议
                    </button>
<button class="px-4 py-2 rounded-full font-label-sm text-label-sm bg-surface-container-highest text-on-surface-variant border border-transparent transition-colors">
                        问题反馈
                    </button>
<button class="px-4 py-2 rounded-full font-label-sm text-label-sm bg-surface-container-highest text-on-surface-variant border border-transparent transition-colors">
                        数据与隐私
                    </button>
<button class="px-4 py-2 rounded-full font-label-sm text-label-sm bg-surface-container-highest text-on-surface-variant border border-transparent transition-colors">
                        账号问题
                    </button>
</div>
</div>
<!-- 2. Description -->
<div class="flex flex-col gap-base">
<textarea class="w-full h-32 bg-surface-container-low rounded-xl p-4 font-body-md text-body-md text-on-surface placeholder:text-outline/70 border-0 focus:ring-1 focus:ring-primary focus:bg-surface transition-all resize-none" placeholder="请详细描述你遇到的问题或建议..."></textarea>
</div>
<!-- 3. Contact (Optional) -->
<div class="flex flex-col gap-base">
<span class="font-label-sm text-label-sm text-on-surface-variant">联系方式 (选填)</span>
<input class="w-full bg-surface-container-low rounded-xl p-4 font-body-md text-body-md text-on-surface placeholder:text-outline/70 border-0 focus:ring-1 focus:ring-primary focus:bg-surface transition-all" placeholder="邮箱或手机号" type="text">
</div>
<!-- 4. Device Info Switch -->
<div class="bg-surface-container-low rounded-xl p-4 flex items-center justify-between mt-2"><div class="flex flex-col gap-xs pr-4 pointer-events-none">
<span class="font-body-md text-body-md text-on-surface font-medium">附带设备信息</span>
<span class="font-label-sm text-label-sm text-outline">开启后，仅附带用于问题排查的基础信息。</span>
</div>
<label class="relative flex items-center cursor-pointer shrink-0">
  <input aria-label="附带设备信息开关" class="sr-only peer" type="checkbox" id="device-info-toggle">
  <div class="w-[51px] h-[31px] bg-[#e5e5ea] rounded-[15.5px] relative peer-checked:bg-[#7eb3ff] transition-colors after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-[27px] after:w-[27px] after:shadow-[0_2px_4px_rgba(0,0,0,0.2)] after:transition-transform peer-checked:after:translate-x-[20px]"></div>
</label></div>
<!-- Submit Button -->
<button class="w-full mt-4 bg-outline-variant text-white font-body-md text-body-md font-semibold py-4 rounded-full shadow-sm opacity-50 cursor-not-allowed transition-all active:scale-[0.98] min-h-[56px] flex items-center justify-center" disabled="" id="submit-btn">
    提交反馈
</button>
<!-- Safe area padding for bottom notch -->
<div class="h-4"></div>
</div>
</div>
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[60] bg-on-surface/80 text-surface px-6 py-3 rounded-full font-label-sm pointer-events-none opacity-0 transition-opacity flex items-center gap-2" id="status-toast">
<span class="material-symbols-outlined text-[18px]">check_circle</span>
<span id="toast-message" class="">提交成功</span>
</div>
