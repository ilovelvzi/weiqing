<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>微轻 App - 账号注销冷静期</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#ffffff",
                        "tertiary": "#725b2b",
                        "outline-variant": "#c2c6d2",
                        "primary-container": "#7eb3ff",
                        "inverse-primary": "#a6c8ff",
                        "on-primary-fixed": "#001c3a",
                        "on-secondary-container": "#436d57",
                        "secondary": "#3d6751",
                        "primary": "#205fa5",
                        "on-error-container": "#93000a",
                        "inverse-surface": "#2a313c",
                        "on-surface-variant": "#424751",
                        "tertiary-container": "#caad75",
                        "on-primary-fixed-variant": "#004786",
                        "tertiary-fixed": "#fedfa3",
                        "error": "#ba1a1a",
                        "surface-variant": "#dce3f2",
                        "surface-dim": "#d3dae9",
                        "on-primary-container": "#004481",
                        "tertiary-fixed-dim": "#e1c389",
                        "on-secondary-fixed-variant": "#254f3a",
                        "surface-container-high": "#e2e8f8",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#261900",
                        "background": "#f9f9ff",
                        "outline": "#727782",
                        "inverse-on-surface": "#ebf1ff",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#584416",
                        "on-secondary-fixed": "#002113",
                        "secondary-fixed-dim": "#a4d1b6",
                        "primary-fixed": "#d4e3ff",
                        "on-primary": "#ffffff",
                        "secondary-container": "#bfedd1",
                        "surface-tint": "#205fa5",
                        "on-surface": "#151c27",
                        "surface-container-low": "#f0f3ff",
                        "error-container": "#ffdad6",
                        "surface-container": "#e7eefe",
                        "on-tertiary-container": "#554013",
                        "surface-container-highest": "#dce3f2",
                        "surface": "#f9f9ff",
                        "on-background": "#151c27",
                        "on-error": "#ffffff",
                        "surface-bright": "#f9f9ff",
                        "secondary-fixed": "#bfedd1",
                        "primary-fixed-dim": "#a6c8ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "sm": "12px",
                        "md": "24px",
                        "margin-mobile": "20px",
                        "lg": "40px",
                        "base": "8px",
                        "margin-desktop": "64px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "label-sm": ["Manrope"],
                        "body-md": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"],
                        "display-num": ["Manrope"],
                        "headline-lg": ["Manrope"]
                    },
                    "fontSize": {
                        "label-sm": ["13px", { "lineHeight": "18px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "display-num": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #f9f9ff;
            color: #151c27;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Airy shadow */
        .shadow-airy {
            box-shadow: 0 4px 20px rgba(32, 95, 165, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-md border-b border-outline-variant/30 flex items-center justify-between px-margin-mobile h-[44px]">
<button aria-label="Back" class="text-primary hover:opacity-70 transition-opacity active:scale-95 flex items-center">
<span class="material-symbols-outlined" data-icon="arrow_back_ios">arrow_back_ios</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">账号注销</h1>
<div class="w-[24px]"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content -->
<main class="w-full max-w-[600px] mt-[64px] px-margin-mobile flex-1 pb-lg">
<!-- Header Section -->
<section class="mb-lg text-center mt-md">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-container-high text-on-surface-variant mb-sm">
<span class="material-symbols-outlined text-[32px]" data-icon="hourglass_top">hourglass_top</span>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">账号正在注销冷静期</h2>
</section>
<!-- Status Summary Card -->
<section class="bg-surface-container-lowest rounded-xl p-md shadow-airy border border-outline-variant/20 mb-md relative overflow-hidden">
<!-- Subtle gradient background for locking feel -->
<div class="absolute inset-0 bg-gradient-to-br from-surface-container-lowest to-surface-container-low opacity-50 z-0"></div>
<div class="relative z-10 flex flex-col gap-sm">
<div class="flex justify-between items-baseline border-b border-outline-variant/20 pb-sm mb-sm">
<span class="font-body-md text-body-md text-on-surface-variant">剩余时间</span>
<div class="flex items-baseline gap-xs">
<span class="font-display-num text-display-num text-primary">29</span>
<span class="font-body-md text-body-md text-on-surface-variant">天</span>
</div>
</div>
<div class="flex justify-between items-center py-xs">
<span class="font-body-md text-body-md text-on-surface-variant">当前状态</span>
<span class="font-label-sm text-label-sm bg-surface-container px-sm py-xs rounded-full text-on-surface">冷静期</span>
</div>
<div class="flex justify-between items-center py-xs">
<span class="font-body-md text-body-md text-on-surface-variant">数据状态</span>
<div class="flex items-center gap-xs text-error">
<span class="material-symbols-outlined text-[16px]" data-icon="lock">lock</span>
<span class="font-label-sm text-label-sm">已锁定</span>
</div>
</div>
<div class="flex justify-between items-center py-xs">
<span class="font-body-md text-body-md text-on-surface-variant">提醒状态</span>
<div class="flex items-center gap-xs text-outline">
<span class="material-symbols-outlined text-[16px]" data-icon="notifications_off">notifications_off</span>
<span class="font-label-sm text-label-sm">已停止</span>
</div>
</div>
</div>
</section>
<!-- Instructions Section -->
<section class="bg-surface-container-low rounded-xl p-md border border-outline-variant/10 mb-lg">
<div class="flex items-start gap-sm">
<span class="material-symbols-outlined text-primary mt-[2px]" data-icon="info">info</span>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">冷静期内，微轻只允许你恢复账号或导出数据，其他功能将暂时不可用。在此期间，你无法继续打卡、查看历史记录或修改体重数据。但你仍可以导出自己的历史数据，或恢复账号。</p>
</div>
</section>
<!-- Action Buttons -->
<section class="flex flex-col gap-sm">
<button class="w-full bg-primary text-on-primary font-body-md text-body-md py-[16px] rounded-full hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-xs shadow-airy">
<span class="material-symbols-outlined" data-icon="settings_backup_restore">settings_backup_restore</span>
                恢复账号
            </button>
<button class="w-full bg-surface-container-highest text-primary font-body-md text-body-md py-[16px] rounded-full hover:bg-surface-variant active:scale-[0.98] transition-all flex items-center justify-center gap-xs">
<span class="material-symbols-outlined" data-icon="download">download</span>
                导出数据
            </button>
<button class="w-full text-on-surface-variant font-body-md text-body-md py-sm mt-xs hover:text-on-surface transition-colors">
                退出登录
            </button>
</section>
</main>
</body></html>
