<!DOCTYPE html><html class="light" lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>确认注销</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom Checkbox Style for iOS feel */
        .ios-checkbox:checked {
            background-color: var(--tw-color-error);
            border-color: var(--tw-color-error);
        }
        .ios-checkbox:checked::after {
            content: '';
            position: absolute;
            left: 6px;
            top: 2px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#ffffff",
                        "tertiary": "#725b2b",
                        "outline-variant": "#c2c6d2",
                        "primary-container": "#7eb3ff",
                        "inverse-primary": "#a6c8ff",
                        "on-primary-fixed": "#001c3a",
                        "on-secondary-container": "#436d57",
                        "secondary": "#3d6751",
                        "primary": "#205fa5",
                        "on-error-container": "#93000a",
                        "inverse-surface": "#2a313c",
                        "on-surface-variant": "#424751",
                        "tertiary-container": "#caad75",
                        "on-primary-fixed-variant": "#004786",
                        "tertiary-fixed": "#fedfa3",
                        "error": "#ba1a1a",
                        "surface-variant": "#dce3f2",
                        "surface-dim": "#d3dae9",
                        "on-primary-container": "#004481",
                        "tertiary-fixed-dim": "#e1c389",
                        "on-secondary-fixed-variant": "#254f3a",
                        "surface-container-high": "#e2e8f8",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#261900",
                        "background": "#f9f9ff",
                        "outline": "#727782",
                        "inverse-on-surface": "#ebf1ff",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#584416",
                        "on-secondary-fixed": "#002113",
                        "secondary-fixed-dim": "#a4d1b6",
                        "primary-fixed": "#d4e3ff",
                        "on-primary": "#ffffff",
                        "secondary-container": "#bfedd1",
                        "surface-tint": "#205fa5",
                        "on-surface": "#151c27",
                        "surface-container-low": "#f0f3ff",
                        "error-container": "#ffdad6",
                        "surface-container": "#e7eefe",
                        "on-tertiary-container": "#554013",
                        "surface-container-highest": "#dce3f2",
                        "surface": "#f9f9ff",
                        "on-background": "#151c27",
                        "on-error": "#ffffff",
                        "surface-bright": "#f9f9ff",
                        "secondary-fixed": "#bfedd1",
                        "primary-fixed-dim": "#a6c8ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "sm": "12px",
                        "md": "24px",
                        "margin-mobile": "20px",
                        "lg": "40px",
                        "base": "8px",
                        "margin-desktop": "64px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "label-sm": ["Manrope"],
                        "body-md": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"],
                        "display-num": ["Manrope"],
                        "headline-lg": ["Manrope"]
                    },
                    "fontSize": {
                        "label-sm": ["13px", { "lineHeight": "18px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "display-num": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background min-h-screen text-on-surface font-body-md overflow-x-hidden pb-[120px]">
<!-- TopAppBar from Shared Components -->
<header class="bg-background dark:bg-background fixed top-0 w-full z-50 bg-background/80 backdrop-blur-md border-b border-outline-variant/30 flex items-center justify-between px-margin-mobile h-[44px]">
<button aria-label="返回" class="text-primary dark:text-primary-fixed hover:opacity-70 transition-opacity active:scale-95 transition-transform flex items-center justify-center p-2 -ml-2">
<span class="material-symbols-outlined" data-icon="arrow_back_ios">arrow_back_ios</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface dark:text-on-surface absolute left-1/2 -translate-x-1/2 text-[18px]">账号注销</h1>
<div class="w-[32px]"></div> <!-- Placeholder to balance flex -->
</header>
<!-- Main Canvas -->
<main class="pt-[64px] px-margin-mobile max-w-[600px] mx-auto">
<!-- Module 1: Risk Warning -->
<section class="bg-error-container/30 rounded-xl p-md border border-error/10 shadow-[0_8px_30px_rgb(0,0,0,0.04)] mb-lg">
<div class="flex items-center gap-xs mb-sm">
<span class="material-symbols-outlined text-error" data-icon="warning" style="font-variation-settings: 'FILL' 1;">warning</span>
<h2 class="font-headline-lg-mobile text-[20px] text-error">确认注销账号？</h2>
</div>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
                确认后，账号将进入注销冷静期。冷静期内你可以恢复账号；冷静期结束后，数据将进入删除流程，无法恢复。
            </p>
</section>
<!-- Module 2: Checkboxes -->
<section class="mb-lg space-y-sm">
<label class="flex items-start gap-sm p-sm rounded-lg hover:bg-surface-container-high/50 transition-colors cursor-pointer group">
<div class="relative flex items-center justify-center mt-[2px]">
<input class="ios-checkbox appearance-none w-[20px] h-[20px] rounded-full border border-outline-variant bg-surface-container-lowest transition-all duration-200 cursor-pointer group-hover:border-error/50" type="checkbox">
</div>
<span class="font-body-md text-body-md text-on-surface pt-[1px]">我已了解冷静期结束后数据无法恢复</span>
</label>
<label class="flex items-start gap-sm p-sm rounded-lg hover:bg-surface-container-high/50 transition-colors cursor-pointer group">
<div class="relative flex items-center justify-center mt-[2px]">
<input class="ios-checkbox appearance-none w-[20px] h-[20px] rounded-full border border-outline-variant bg-surface-container-lowest transition-all duration-200 cursor-pointer group-hover:border-error/50" type="checkbox">
</div>
<span class="font-body-md text-body-md text-on-surface pt-[1px]">我已了解冷静期内仍可导出数据</span>
</label>
<label class="flex items-start gap-sm p-sm rounded-lg hover:bg-surface-container-high/50 transition-colors cursor-pointer group">
<div class="relative flex items-center justify-center mt-[2px]">
<input class="ios-checkbox appearance-none w-[20px] h-[20px] rounded-full border border-outline-variant bg-surface-container-lowest transition-all duration-200 cursor-pointer group-hover:border-error/50" type="checkbox">
</div>
<span class="font-body-md text-body-md text-on-surface pt-[1px]">我已了解所有提醒和报告通知将停止</span>
</label>
</section>
<!-- Module 3: Text Input Confirmation -->
<section class="mb-lg">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs ml-1" for="confirmInput">请输入“注销账号”以确认</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border border-transparent rounded-lg px-md py-sm font-body-md text-body-md text-on-surface focus:bg-surface-container-lowest focus:border-error/50 focus:ring-4 focus:ring-error/10 focus:outline-none transition-all placeholder:text-outline-variant shadow-inner" id="confirmInput" placeholder="注销账号" type="text">
</div>
</section>
</main>
<!-- Bottom Button Fixed Area -->
<div class="fixed bottom-0 w-full left-0 px-margin-mobile pt-sm pb-[max(24px,env(safe-area-inset-bottom))] bg-background/90 backdrop-blur-xl border-t border-surface-container-highest flex justify-center z-40">
<button class="w-full max-w-[600px] bg-surface-container-highest text-outline font-headline-lg-mobile text-[16px] py-[16px] rounded-full transition-all duration-300 disabled:opacity-60 flex justify-center items-center gap-xs" disabled="" id="submitBtn">
            确认注销账号
        </button>
</div>
<!-- Interactive Logic -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const checkboxes = document.querySelectorAll('.ios-checkbox');
            const input = document.getElementById('confirmInput');
            const btn = document.getElementById('submitBtn');

            function validateForm() {
                // Check if all checkboxes are checked
                let allChecked = true;
                checkboxes.forEach(cb => {
                    if (!cb.checked) allChecked = false;
                });

                // Check text input exact match
                const textMatch = input.value.trim() === '注销账号';

                // Update button state
                if (allChecked && textMatch) {
                    btn.disabled = false;
                    // Apply Red Soft Warning Style active
                    btn.className = "w-full max-w-[600px] bg-error-container text-error font-headline-lg-mobile text-[16px] py-[16px] rounded-full transition-all duration-300 active:scale-[0.98] active:bg-error/30 flex justify-center items-center gap-xs shadow-[0_8px_20px_rgba(186,26,26,0.15)]";
                } else {
                    btn.disabled = true;
                    // Revert to disabled ghost style
                    btn.className = "w-full max-w-[600px] bg-surface-container-highest text-outline font-headline-lg-mobile text-[16px] py-[16px] rounded-full transition-all duration-300 disabled:opacity-60 flex justify-center items-center gap-xs";
                }
            }

            // Bind events
            checkboxes.forEach(cb => cb.addEventListener('change', validateForm));
            input.addEventListener('input', validateForm);
        });
    </script>
</body></html>
