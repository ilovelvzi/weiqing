<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col pt-safe pb-safe">
<!-- TopAppBar from JSON -->
<header aria-label="顶部导航" class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-md border-b border-outline-variant/30 pt-[env(safe-area-inset-top)]">
<div class="flex items-center justify-between px-margin-mobile h-[44px] w-full">
<button aria-label="返回" class="flex items-center justify-center w-[44px] h-[44px] -ml-[10px] text-primary dark:text-primary-fixed hover:opacity-70 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="arrow_back_ios">arrow_back_ios</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface dark:text-on-surface flex-1 text-center truncate px-4">
                验证身份
            </h1>
<!-- Placeholder for right icon to maintain centering -->
<div class="w-[44px] h-[44px] -mr-[10px]"></div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col px-margin-mobile pt-[calc(44px+env(safe-area-inset-top)+64px)] pb-lg items-center justify-between h-full">
<!-- Central Content Container -->
<div class="flex flex-col items-center justify-center flex-1 w-full max-w-sm mx-auto animate-[fadeIn_0.5s_ease-out]">
<!-- Face ID Icon / Visual Anchor -->
<div class="w-32 h-32 rounded-3xl bg-surface-container-low shadow-airy flex items-center justify-center mb-8 border border-outline-variant/10 relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-tr from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
<span class="material-symbols-outlined text-[64px] text-primary" data-icon="face" style="font-variation-settings: 'wght' 200;">face</span>
</div>
<!-- Text Content -->
<div class="text-center space-y-4 px-4">
<h2 class="font-headline-lg-mobile text-[24px] leading-8 text-on-surface">
                    验证身份
                </h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto leading-relaxed">
                    为了保护你的账号和健康数据，注销前需要完成身份验证。
                </p>
</div>
</div>
<!-- Bottom Actions -->
<div class="w-full max-w-sm mx-auto space-y-md mt-auto pt-lg">
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary py-4 rounded-full font-body-md text-body-md font-medium hover:opacity-90 active:scale-[0.98] transition-all duration-200 shadow-sm min-h-[56px] flex items-center justify-center">
                验证并继续
            </button>
<!-- Secondary Action -->
<button class="w-full py-4 text-primary font-body-md text-body-md hover:bg-primary/5 rounded-full active:scale-[0.98] transition-all duration-200 min-h-[56px] flex items-center justify-center">
                使用验证码或密码验证
            </button>
</div>
</main>
<!-- JavaScript for basic interaction styling -->
<script>
        // Simple animation for elements loading in
        document.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('main > div');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(10px)';
                el.style.transition = 'all 0.5s ease-out';
                
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 100 * (index + 1));
            });
        });
    </script>
