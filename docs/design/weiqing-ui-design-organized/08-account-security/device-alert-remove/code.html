<!DOCTYPE html><html class="light" lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>已登录设备管理 - 微轻 App</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#a6c8ff",
                        "outline-variant": "#c2c6d2",
                        "primary-fixed": "#d4e3ff",
                        "on-surface-variant": "#424751",
                        "on-error-container": "#93000a",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#fedfa3",
                        "on-secondary-fixed-variant": "#254f3a",
                        "inverse-surface": "#2a313c",
                        "tertiary": "#725b2b",
                        "surface-variant": "#dce3f2",
                        "outline": "#727782",
                        "error": "#ba1a1a",
                        "on-primary-container": "#004481",
                        "surface-container-low": "#f0f3ff",
                        "on-secondary": "#ffffff",
                        "tertiary-container": "#caad75",
                        "surface-dim": "#d3dae9",
                        "error-container": "#ffdad6",
                        "primary": "#205fa5",
                        "surface": "#f9f9ff",
                        "secondary-fixed": "#bfedd1",
                        "secondary-container": "#bfedd1",
                        "primary-container": "#7eb3ff",
                        "surface-bright": "#f9f9ff",
                        "on-secondary-container": "#436d57",
                        "inverse-on-surface": "#ebf1ff",
                        "on-tertiary-container": "#554013",
                        "on-tertiary-fixed-variant": "#584416",
                        "on-tertiary-fixed": "#261900",
                        "on-surface": "#151c27",
                        "on-background": "#151c27",
                        "surface-container-highest": "#dce3f2",
                        "on-primary-fixed-variant": "#004786",
                        "on-primary": "#ffffff",
                        "surface-tint": "#205fa5",
                        "tertiary-fixed-dim": "#e1c389",
                        "secondary": "#3d6751",
                        "on-secondary-fixed": "#002113",
                        "background": "#f9f9ff",
                        "secondary-fixed-dim": "#a4d1b6",
                        "on-error": "#ffffff",
                        "inverse-primary": "#a6c8ff",
                        "surface-container": "#e7eefe",
                        "on-primary-fixed": "#001c3a",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e2e8f8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                    },
                    "spacing": {
                        "xs": "4px",
                        "sm": "12px",
                        "lg": "40px",
                        "gutter": "16px",
                        "margin-mobile": "20px",
                        "margin-desktop": "64px",
                        "base": "8px",
                        "md": "24px"
                    },
                    "fontFamily": {
                        "display-num": ["Manrope"],
                        "headline-lg": ["Manrope"],
                        "label-sm": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"],
                        "body-md": ["Manrope"]
                    },
                    "fontSize": {
                        "display-num": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-sm": ["13px", { "lineHeight": "18px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #f9f9ff;
            color: #151c27;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Subtle animation for the modal */
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95) translate(-50%, -50%); }
            to { opacity: 1; transform: scale(1) translate(-50%, -50%); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-overlay {
            animation: fadeIn 0.2s ease-out forwards;
        }
        
        .modal-content {
            animation: scaleIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform-origin: center center;
        }
        
        /* High-blur ambient shadow for cards */
        .ambient-shadow {
            box-shadow: 0 8px 30px rgba(32, 95, 165, 0.06);
        }
    </style>
</head>
<body class="bg-background min-h-screen flex flex-col items-center overflow-hidden">
<!-- TopAppBar -->
<header class="w-full sticky top-0 z-10 bg-background/80 backdrop-blur-md flex items-center h-16 px-margin-mobile">
<button aria-label="返回" class="w-10 h-10 flex items-center justify-center -ml-2 text-primary hover:opacity-70 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" style="font-size: 24px;">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-semibold text-on-surface ml-2">已登录设备管理</h1>
</header>
<!-- Main Content Canvas (Background Mock) -->
<main class="w-full max-w-[1200px] flex-1 px-margin-mobile pt-md pb-[100px] filter blur-[2px] opacity-60 transition-all duration-300">
<p class="font-body-md text-body-md text-on-surface-variant mb-md">管理您当前登录的设备。</p>
<!-- Device List (Bento-style Cards) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Current Device -->
<div class="bg-surface-container-lowest rounded-3xl p-md ambient-shadow border border-outline-variant/10 relative overflow-hidden flex items-start gap-md">
<div class="w-12 h-12 rounded-full bg-primary-container/20 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary" style="font-size: 24px;">smartphone</span>
</div>
<div class="flex-1">
<h2 class="font-body-md text-body-md font-semibold text-on-surface mb-xs">iPhone 14 Pro</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant mb-xs">当前设备 · iOS 16.5</p>
<p class="font-label-sm text-label-sm text-outline">最近活跃：刚刚</p>
</div>
<div class="px-sm py-xs bg-primary/10 rounded-full text-primary font-label-sm text-label-sm">
                    本设备
                </div>
</div>
<!-- Other Device 1 -->
<div class="bg-surface-container-lowest rounded-3xl p-md ambient-shadow border border-outline-variant/10 relative overflow-hidden flex items-start gap-md">
<div class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-on-surface-variant" style="font-size: 24px;">laptop_mac</span>
</div>
<div class="flex-1">
<h2 class="font-body-md text-body-md font-semibold text-on-surface mb-xs">MacBook Pro</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant mb-xs">macOS 13.4</p>
<p class="font-label-sm text-label-sm text-outline">最近活跃：昨天 14:30</p>
</div>
<button class="text-error font-body-md text-body-md p-2 hover:opacity-70 transition-opacity">
                    移除
                </button>
</div>
<!-- Other Device 2 -->
<div class="bg-surface-container-lowest rounded-3xl p-md ambient-shadow border border-outline-variant/10 relative overflow-hidden flex items-start gap-md">
<div class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-on-surface-variant" style="font-size: 24px;">tablet_mac</span>
</div>
<div class="flex-1">
<h2 class="font-body-md text-body-md font-semibold text-on-surface mb-xs">iPad Air</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant mb-xs">iPadOS 16.4</p>
<p class="font-label-sm text-label-sm text-outline">最近活跃：3天前</p>
</div>
<button class="text-error font-body-md text-body-md p-2 hover:opacity-70 transition-opacity">
                    移除
                </button>
</div>
</div>
</main>
<!-- BottomNavBar (Suppressed intentionally as per rules, but included in DOM for structure if needed, hidden here since it's a sub-page with a back button) -->
<!-- Navigation hidden on transactional/task-focused page -->
<!-- iOS Native Style Alert Modal -->
<div class="fixed inset-0 z-50 flex items-center justify-center modal-overlay bg-on-surface/40 backdrop-blur-sm">
<!-- Alert Box -->
<div class="modal-content absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[270px] bg-surface-container-lowest/90 backdrop-blur-xl rounded-2xl overflow-hidden shadow-2xl flex flex-col text-center">
<!-- Content Area -->
<div class="p-5 pt-6 pb-5 flex flex-col items-center">
<h3 class="font-body-md text-[17px] font-semibold text-on-surface leading-tight mb-2 tracking-tight">
                    移除这台设备？
                </h3>
<p class="font-label-sm text-[13px] text-on-surface-variant leading-snug">
                    该设备将退出登录。未同步的数据会继续保存在那台设备本地，联网后会被冻结，不会参与其他账号同步。
                </p>
</div>
<!-- Button Area (Horizontal Split) -->
<div class="flex border-t border-outline-variant/30 h-[44px]">
<button class="flex-1 font-body-md text-[17px] text-primary hover:bg-surface-variant/50 active:bg-surface-variant transition-colors border-r border-outline-variant/30">
                    取消
                </button>
<button class="flex-1 font-body-md text-[17px] font-semibold text-error hover:bg-error-container/20 active:bg-error-container/30 transition-colors">
                    移除设备
                </button>
</div>
</div>
</div>
</body></html>
