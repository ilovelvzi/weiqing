<script>
        // Simple script to toggle "Cancel All" / "Select All"
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.querySelector('button.text-primary');
            const checkboxes = document.querySelectorAll('.ios-list-checkbox');
            
            toggleBtn.addEventListener('click', () => {
                const isCancel = toggleBtn.textContent === '取消全选';
                
                checkboxes.forEach(cb => {
                    cb.checked = !isCancel;
                });
                
                toggleBtn.textContent = isCancel ? '全选' : '取消全选';
            });

            // Update button text based on manual checkbox changes
            checkboxes.forEach(cb => {
                cb.addEventListener('change', () => {
                    const allChecked = Array.from(checkboxes).every(c => c.checked);
                    const anyChecked = Array.from(checkboxes).some(c => c.checked);
                    
                    if (allChecked) {
                        toggleBtn.textContent = '取消全选';
                    } else if (!anyChecked) {
                        toggleBtn.textContent = '全选';
                    } else {
                        toggleBtn.textContent = '全选'; // Or '取消全选' depending on desired UX
                    }
                });
            });
        });
    </script>
