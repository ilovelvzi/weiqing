<!DOCTYPE html><html class="light" lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport">
<title>微轻 - 健康数据</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<!-- Google Fonts (Manrope for Design System alignment) -->
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Design System Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#151c27",
                        "tertiary-fixed-dim": "#e1c389",
                        "secondary": "#3d6751",
                        "on-primary-fixed-variant": "#004786",
                        "inverse-primary": "#a6c8ff",
                        "secondary-fixed-dim": "#a4d1b6",
                        "inverse-surface": "#2a313c",
                        "primary-container": "#7eb3ff",
                        "on-tertiary-fixed": "#261900",
                        "error": "#ba1a1a",
                        "surface-bright": "#f9f9ff",
                        "on-background": "#151c27",
                        "surface-container": "#e7eefe",
                        "tertiary-fixed": "#fedfa3",
                        "on-primary": "#ffffff",
                        "tertiary": "#725b2b",
                        "surface-tint": "#205fa5",
                        "on-secondary-fixed-variant": "#254f3a",
                        "inverse-on-surface": "#ebf1ff",
                        "on-primary-fixed": "#001c3a",
                        "on-tertiary": "#ffffff",
                        "surface-dim": "#d3dae9",
                        "on-primary-container": "#004481",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#d4e3ff",
                        "on-surface-variant": "#424751",
                        "tertiary-container": "#caad75",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#e2e8f8",
                        "surface-container-highest": "#dce3f2",
                        "outline": "#727782",
                        "secondary-container": "#bfedd1",
                        "outline-variant": "#c2c6d2",
                        "secondary-fixed": "#bfedd1",
                        "primary": "#205fa5",
                        "surface-container-low": "#f0f3ff",
                        "on-tertiary-container": "#554013",
                        "surface": "#f9f9ff",
                        "background": "#f9f9ff",
                        "surface-variant": "#dce3f2",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#436d57",
                        "on-secondary-fixed": "#002113",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed-variant": "#584416",
                        "primary-fixed-dim": "#a6c8ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "sm": "12px",
                        "margin-desktop": "64px",
                        "lg": "40px",
                        "margin-mobile": "20px",
                        "md": "24px",
                        "xs": "4px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"],
                        "display-num": ["Manrope"],
                        "label-sm": ["Manrope"],
                        "body-md": ["Manrope"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "display-num": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["13px", { "lineHeight": "18px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom "Airy" shadow */
        .shadow-airy {
            box-shadow: 0 4px 20px rgba(32, 95, 165, 0.04);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen pt-safe pb-safe">
<!-- Top Navigation (Custom for Details Page - Not using TopAppBar from JSON as it's for top-level destinations) -->
<header class="fixed top-0 w-full z-50 bg-surface/90 backdrop-blur-md border-b border-outline-variant/10 shadow-sm shadow-primary/5 pt-safe transition-colors duration-300">
<div class="flex justify-between items-center h-16 px-margin-mobile w-full max-w-7xl mx-auto">
<button aria-label="返回" class="w-10 h-10 flex items-center justify-start text-on-surface hover:text-primary transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">健康数据</h1>
<div class="w-10 h-10"></div> <!-- Placeholder for centering -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-[calc(64px+env(safe-area-inset-top))] pb-lg px-margin-mobile max-w-lg mx-auto md:max-w-3xl lg:max-w-7xl md:px-margin-desktop space-y-md">
<!-- Module 1: 基础资料 (Grouped List) -->
<section class="bg-surface-container-lowest rounded-2xl shadow-airy border border-outline-variant/10 overflow-hidden">
<h2 class="font-label-sm text-label-sm text-outline px-gutter py-sm bg-surface-container-lowest border-b border-surface-container">基础资料</h2>
<div class="divide-y divide-surface-container">
<!-- Row 1: 身高 -->
<button class="w-full flex items-center justify-between px-gutter py-md bg-surface-container-lowest hover:bg-surface-container-low/50 transition-colors">
<span class="text-on-surface">身高</span>
<div class="flex items-center text-outline gap-xs">
<span class="text-on-surface-variant">170 cm</span>
<span class="material-symbols-outlined text-lg">chevron_right</span>
</div>
</button>
<!-- Row 2: 当前体重 -->
<div class="w-full flex items-center justify-between px-gutter py-md bg-surface-container-lowest">
<span class="text-on-surface">当前体重</span>
<div class="flex items-center gap-xs">
<span class="text-on-surface-variant">65.5 kg</span>
<!-- No chevron, implies read-only or updated elsewhere -->
</div>
</div>
<!-- Row 3: 目标体重 -->
<button class="w-full flex items-center justify-between px-gutter py-md bg-surface-container-lowest hover:bg-surface-container-low/50 transition-colors">
<span class="text-on-surface">目标体重</span>
<div class="flex items-center text-outline gap-xs">
<span class="text-primary font-medium">58.0 kg</span>
<span class="material-symbols-outlined text-lg">chevron_right</span>
</div>
</button>
</div>
</section>
<!-- Module 2: 核心健康指标 (2x2 Grid) -->
<section>
<h2 class="font-label-sm text-label-sm text-outline px-sm pb-sm">核心指标</h2>
<div class="grid grid-cols-2 gap-gutter">
<!-- BMI Card -->
<div class="bg-surface-container-lowest rounded-2xl p-md shadow-airy border border-outline-variant/10 flex flex-col justify-between aspect-square">
<div class="flex justify-between items-start">
<span class="text-on-surface-variant font-label-sm text-label-sm">BMI</span>
<span class="material-symbols-outlined text-primary" data-icon="monitor_weight" data-weight="fill">monitor_weight</span>
</div>
<div>
<div class="font-display-num text-[32px] leading-tight text-on-surface">22.5</div>
<div class="flex flex-wrap gap-xs mt-2">
<span class="bg-secondary-container/30 text-secondary px-2 py-1 rounded-full font-label-sm text-label-sm text-[11px]">理想</span>
<span class="bg-surface-variant/30 text-outline px-2 py-1 rounded-full font-label-sm text-label-sm text-[11px]">中国标准</span>
</div>
</div>
</div>
<!-- BMR Card -->
<div class="bg-surface-container-lowest rounded-2xl p-md shadow-airy border border-outline-variant/10 flex flex-col justify-between aspect-square">
<div class="flex justify-between items-start">
<span class="text-on-surface-variant font-label-sm text-label-sm">基础代谢率</span>
<span class="material-symbols-outlined text-tertiary-fixed-dim" data-icon="local_fire_department" data-weight="fill">local_fire_department</span>
</div>
<div>
<div class="font-display-num text-[32px] leading-tight text-on-surface">1487</div>
<div class="text-outline-variant font-label-sm text-label-sm mt-1">kcal</div>
</div>
</div>
<!-- Body Fat Card -->
<button class="bg-surface-container-lowest rounded-2xl p-md shadow-airy border border-outline-variant/10 flex flex-col justify-between aspect-square text-left hover:bg-surface-container-low/50 transition-colors group">
<div class="flex justify-between items-start w-full">
<span class="text-on-surface-variant font-label-sm text-label-sm">体脂率</span>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">add_circle</span>
</div>
<div class="flex items-center text-primary gap-xs">
<span class="font-body-md">去补充</span>
<span class="material-symbols-outlined text-sm">chevron_right</span>
</div>
</button>
<!-- Target Heart Rate Card -->
<div class="bg-surface-container-lowest rounded-2xl p-md shadow-airy border border-outline-variant/10 flex flex-col justify-between aspect-square">
<div class="flex justify-between items-start">
<span class="text-on-surface-variant font-label-sm text-label-sm">靶心率</span>
<span class="material-symbols-outlined text-error" data-icon="favorite" data-weight="fill">favorite</span>
</div>
<div>
<div class="font-display-num text-[28px] leading-tight text-on-surface tracking-tighter">120-150</div>
<div class="text-outline-variant font-label-sm text-label-sm mt-1">次/分</div>
</div>
</div>
</div>
</section>
<!-- Module 3: 围度数据 (Grouped List) -->
<section class="bg-surface-container-lowest rounded-2xl shadow-airy border border-outline-variant/10 overflow-hidden">
<h2 class="font-label-sm text-label-sm text-outline px-gutter py-sm bg-surface-container-lowest border-b border-surface-container">围度数据</h2>
<div class="divide-y divide-surface-container">
<!-- 腰围 -->
<button class="w-full flex items-center justify-between px-gutter py-md bg-surface-container-lowest hover:bg-surface-container-low/50 transition-colors">
<span class="text-on-surface">腰围</span>
<div class="flex items-center text-outline-variant gap-xs">
<span>-- cm</span>
<span class="material-symbols-outlined text-lg">chevron_right</span>
</div>
</button>
<!-- 臀围 -->
<button class="w-full flex items-center justify-between px-gutter py-md bg-surface-container-lowest hover:bg-surface-container-low/50 transition-colors">
<span class="text-on-surface">臀围</span>
<div class="flex items-center text-outline-variant gap-xs">
<span>-- cm</span>
<span class="material-symbols-outlined text-lg">chevron_right</span>
</div>
</button>
<!-- 胸围 -->
<button class="w-full flex items-center justify-between px-gutter py-md bg-surface-container-lowest hover:bg-surface-container-low/50 transition-colors">
<span class="text-on-surface">胸围</span>
<div class="flex items-center text-outline-variant gap-xs">
<span>-- cm</span>
<span class="material-symbols-outlined text-lg">chevron_right</span>
</div>
</button>
<!-- 大腿围 -->
<button class="w-full flex items-center justify-between px-gutter py-md bg-surface-container-lowest hover:bg-surface-container-low/50 transition-colors">
<span class="text-on-surface">大腿围</span>
<div class="flex items-center text-outline-variant gap-xs">
<span>-- cm</span>
<span class="material-symbols-outlined text-lg">chevron_right</span>
</div>
</button>
<!-- 手臂围 -->
<button class="w-full flex items-center justify-between px-gutter py-md bg-surface-container-lowest hover:bg-surface-container-low/50 transition-colors">
<span class="text-on-surface">手臂围</span>
<div class="flex items-center text-outline-variant gap-xs">
<span>-- cm</span>
<span class="material-symbols-outlined text-lg">chevron_right</span>
</div>
</button>
</div>
</section>
<!-- Module 4: 底部指标说明卡片 -->
<section class="bg-surface-container/50 rounded-2xl p-md mt-lg border border-surface-variant/50">
<div class="flex items-center gap-sm mb-sm">
<span class="material-symbols-outlined text-primary" data-icon="info">info</span>
<h3 class="font-label-sm text-label-sm text-on-surface-variant font-semibold">这些数字只是参考</h3>
</div>
<p class="font-label-sm text-label-sm text-outline leading-relaxed">
                健康指标可以帮助你更了解自己的状态，但它们不能替代专业医疗建议。微轻会尽量用温和的方式陪你观察变化。
            </p>
</section>
</main>
</body></html>
