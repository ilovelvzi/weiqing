<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport">
<title>目标体重</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#554013",
                        "outline": "#727782",
                        "on-primary": "#ffffff",
                        "surface-variant": "#dce3f2",
                        "inverse-on-surface": "#ebf1ff",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#a6c8ff",
                        "on-secondary-container": "#436d57",
                        "tertiary-container": "#caad75",
                        "surface-container": "#e7eefe",
                        "on-secondary-fixed-variant": "#254f3a",
                        "on-primary-container": "#004481",
                        "on-primary-fixed-variant": "#004786",
                        "primary": "#205fa5",
                        "on-surface": "#151c27",
                        "inverse-primary": "#a6c8ff",
                        "secondary-container": "#bfedd1",
                        "on-primary-fixed": "#001c3a",
                        "background": "#f9f9ff",
                        "secondary": "#3d6751",
                        "on-tertiary": "#ffffff",
                        "error-container": "#ffdad6",
                        "tertiary": "#725b2b",
                        "surface-dim": "#d3dae9",
                        "surface-bright": "#f9f9ff",
                        "on-tertiary-fixed-variant": "#584416",
                        "inverse-surface": "#2a313c",
                        "surface-container-highest": "#dce3f2",
                        "surface-tint": "#205fa5",
                        "secondary-fixed-dim": "#a4d1b6",
                        "on-tertiary-fixed": "#261900",
                        "surface-container-high": "#e2e8f8",
                        "surface": "#f9f9ff",
                        "on-background": "#151c27",
                        "on-secondary": "#ffffff",
                        "error": "#ba1a1a",
                        "primary-container": "#7eb3ff",
                        "tertiary-fixed": "#fedfa3",
                        "secondary-fixed": "#bfedd1",
                        "primary-fixed": "#d4e3ff",
                        "on-surface-variant": "#424751",
                        "on-secondary-fixed": "#002113",
                        "tertiary-fixed-dim": "#e1c389",
                        "outline-variant": "#c2c6d2",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f0f3ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "12px",
                        "margin-mobile": "20px",
                        "lg": "40px",
                        "xs": "4px",
                        "margin-desktop": "64px",
                        "md": "24px",
                        "gutter": "16px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "body-md": ["Manrope"],
                        "label-sm": ["Manrope"],
                        "display-num": ["Manrope"],
                        "headline-lg": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-sm": ["13px", { "lineHeight": "18px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "display-num": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9f9ff;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .ios-shadow {
            box-shadow: 0 8px 30px rgba(32, 95, 165, 0.04);
        }
        
        .grouped-list-item:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 16px;
            right: 0;
            height: 1px;
            background-color: #e2e8f8; /* surface-container-high approx */
        }
        
        .progress-bar-bg {
            background-color: #f0f3ff; /* surface-container-low */
        }
        
        .progress-bar-fill {
            background: linear-gradient(90deg, #7eb3ff 0%, #205fa5 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen pb-32">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 bg-surface/90 backdrop-blur-md border-b border-outline-variant/10 shadow-sm shadow-primary/5 h-[44px] sm:h-16 flex justify-between items-center px-4 pt-safe">
<button class="text-primary p-2 -ml-2 flex items-center justify-center active:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-[24px]">chevron_left</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-on-surface absolute left-1/2 -translate-x-1/2 text-lg sm:text-[28px] tracking-tight">目标体重</h1>
</header>
<main class="pt-[60px] sm:pt-[80px] px-margin-mobile space-y-md pb-safe max-w-md mx-auto">
<!-- Current Status Card -->
<section class="bg-surface-container-lowest rounded-[20px] p-6 ios-shadow border border-outline-variant/10 relative overflow-hidden">
<!-- Decorative blur blob -->
<div class="absolute -right-8 -top-8 w-32 h-32 bg-primary-container/20 rounded-full blur-2xl pointer-events-none"></div>
<div class="flex items-center justify-between mb-4">
<span class="font-body-md text-body-md text-on-surface-variant">当前体重</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">65.5 <span class="text-base text-on-surface-variant font-normal">kg</span></span>
</div>
<div class="grid grid-cols-3 gap-2 pt-4 border-t border-surface-container-high/50">
<div class="flex flex-col items-center">
<span class="font-label-sm text-label-sm text-outline mb-1">目标体重</span>
<span class="font-body-md text-body-md text-on-surface font-medium">58.0 <span class="text-[12px] text-outline">kg</span></span>
</div>
<div class="flex flex-col items-center border-l border-surface-container-high/50">
<span class="font-label-sm text-label-sm text-outline mb-1">距离目标</span>
<span class="font-body-md text-body-md text-on-surface font-medium">7.5 <span class="text-[12px] text-outline">kg</span></span>
</div>
<div class="flex flex-col items-center border-l border-surface-container-high/50">
<span class="font-label-sm text-label-sm text-outline mb-1">完成度</span>
<span class="font-body-md text-body-md text-primary font-medium">0%</span>
</div>
</div>
</section>
<!-- Goal Settings (Grouped List) -->
<section class="bg-surface-container-lowest rounded-[20px] ios-shadow border border-outline-variant/10 overflow-hidden">
<!-- Item 1 -->
<button class="w-full relative flex items-center justify-between p-4 grouped-list-item active:bg-surface-container-high/30 transition-colors h-[56px]">
<span class="font-body-md text-body-md text-on-surface">目标体重</span>
<div class="flex items-center space-x-2">
<span class="font-body-md text-body-md text-on-surface-variant">58.0 kg</span>
<span class="material-symbols-outlined text-outline text-[20px]">chevron_right</span>
</div>
</button>
<!-- Item 2 -->
<button class="w-full relative flex items-center justify-between p-4 grouped-list-item active:bg-surface-container-high/30 transition-colors h-[56px]">
<span class="font-body-md text-body-md text-on-surface">目标起点体重</span>
<div class="flex items-center space-x-2">
<span class="font-body-md text-body-md text-on-surface-variant">65.5 kg</span>
<span class="material-symbols-outlined text-outline text-[20px]">chevron_right</span>
</div>
</button>
<!-- Read Only Label -->
<div class="w-full relative flex items-center justify-between p-4 h-[56px] bg-surface-container-low/30">
<span class="font-body-md text-body-md text-on-surface">目标方向</span>
<span class="font-body-md text-body-md text-on-surface-variant">减重目标</span>
</div>
</section>
<!-- Goal Progress Preview -->
<section class="bg-surface-container-lowest rounded-[20px] p-6 ios-shadow border border-outline-variant/10">
<h3 class="font-body-md text-body-md text-on-surface font-medium mb-6">进度预览</h3>
<!-- Progress Bar -->
<div class="relative w-full h-[12px] progress-bar-bg rounded-full mb-8 overflow-hidden">
<div class="absolute top-0 left-0 h-full progress-bar-fill rounded-full" style="width: 0%;"></div>
<!-- Marker for current progress -->
<div class="absolute top-1/2 -translate-y-1/2 w-4 h-4 bg-surface-container-lowest border-2 border-primary rounded-full shadow-sm" style="left: calc(0% - 8px);"></div>
</div>
<!-- Labels for Progress -->
<div class="flex justify-between items-end mb-6 relative">
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-outline">起点</span>
<span class="font-body-md text-body-md text-on-surface-variant">65.5kg</span>
</div>
<div class="absolute left-[42%] -translate-x-1/2 bottom-8 flex flex-col items-center" style="left: 0%; transform: translateX(0);">
<div class="bg-primary text-on-primary font-label-sm text-[11px] px-2 py-0.5 rounded-full shadow-sm mb-1">0%</div>
</div>
<div class="flex flex-col items-end">
<span class="font-label-sm text-label-sm text-outline">目标</span>
<span class="font-body-md text-body-md text-on-surface-variant">58.0kg</span>
</div>
</div>
<!-- Gentle Caption -->
<div class="bg-surface-container-low/50 rounded-xl p-4 flex items-start space-x-3">
<span class="material-symbols-outlined text-primary-container text-[20px] mt-0.5">favorite</span>
<p class="font-label-sm text-label-sm text-on-surface-variant leading-relaxed">
                    目标只是方向，不是压力。微轻会陪你慢慢看见变化。
                </p>
</div>
</section>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-surface/95 backdrop-blur-xl border-t border-outline-variant/10 pb-safe pt-4 px-margin-mobile z-40 shadow-[0_-8px_24px_rgba(32,95,165,0.06)]">
<div class="max-w-md mx-auto">
<button class="w-full h-[52px] bg-primary text-on-primary font-body-md text-body-md font-medium rounded-full active:scale-[0.98] transition-transform shadow-md shadow-primary/20">
                保存目标
            </button>
</div>
</div>
</body></html>
