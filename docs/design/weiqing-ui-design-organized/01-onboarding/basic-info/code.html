<script>
        // Simple script to handle the visual update of pickers (opacity changes based on scroll position)
        // In a real implementation, this would involve IntersectionObserver or strict scroll offset calculations.
        // This is a lightweight visual approximation for the design.
        
        function setupPicker(pickerId) {
            const picker = document.getElementById(pickerId);
            if(!picker) return;
            
            picker.addEventListener('scroll', () => {
                // Throttle or debounce in production
                const items = picker.children;
                const pickerCenter = picker.getBoundingClientRect().top + (picker.clientHeight / 2);
                
                Array.from(items).forEach(item => {
                    const itemRect = item.getBoundingClientRect();
                    const itemCenter = itemRect.top + (itemRect.height / 2);
                    const distance = Math.abs(pickerCenter - itemCenter);
                    
                    // Reset classes
                    item.classList.remove('opacity-100', 'opacity-60', 'opacity-30', 'text-on-surface');
                    
                    if (distance < 28) { // Approximately centered
                        item.classList.add('opacity-100', 'text-on-surface');
                    } else if (distance < 84) { // 1 item away
                        item.classList.add('opacity-60');
                    } else { // 2+ items away
                        item.classList.add('opacity-30');
                    }
                });
            }, { passive: true });
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            setupPicker('yearPicker');
            setupPicker('heightPicker');
        });
    </script>
