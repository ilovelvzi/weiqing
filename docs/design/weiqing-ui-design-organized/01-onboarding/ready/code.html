<style>
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Ambient Animation for the background */
        @keyframes subtleFloat {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        
        .ambient-shape {
            animation: subtleFloat 8s ease-in-out infinite;
        }
        
        .ambient-shape-delayed {
            animation: subtleFloat 10s ease-in-out infinite 2s;
        }
        
        /* Progress Bar Animation */
        @keyframes fillProgress {
            from { width: 83%; }
            to { width: 100%; }
        }
        
        .progress-fill-animate {
            animation: fillProgress 1s ease-out forwards 0.5s;
        }

        /* Checkmark Animation */
        @keyframes scaleCheck {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .check-animate {
            animation: scaleCheck 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0);
        }
    </style>
