<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-ambient-blur {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            overflow: hidden;
        }
        .bg-ambient-blur::before {
            content: '';
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(126, 179, 255, 0.15) 0%, rgba(249, 249, 255, 0) 70%);
            border-radius: 50%;
            filter: blur(40px);
            animation: float 10s infinite ease-in-out alternate;
        }
        .bg-ambient-blur::after {
            content: '';
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(166, 200, 255, 0.1) 0%, rgba(249, 249, 255, 0) 70%);
            border-radius: 50%;
            filter: blur(50px);
            animation: float 12s infinite ease-in-out alternate-reverse;
        }
        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(5%, 5%); }
        }
    </style>
</head>

<div class="bg-ambient-blur"></div>

</div>

<h2 class="font-body-md text-body-md text-primary font-medium tracking-wide">轻轻记录，看见变化</h2>

<!-- Body Text -->

<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
                用温和的方式记录体重变化。数字只是参考，持续看见自己才更重要。
            </p>
</div>
<!-- Action Buttons -->
<div class="w-full space-y-sm flex flex-col items-center animate-fade-in-up" style="animation-delay: 300ms;">
<button class="w-full max-w-[320px] bg-primary text-on-primary font-label-sm text-label-sm py-4 rounded-full shadow-[0_8px_20px_-8px_rgba(32,95,165,0.4)] hover:shadow-[0_12px_24px_-8px_rgba(32,95,165,0.5)] transition-all duration-300 active:scale-[0.98] flex items-center justify-center gap-2">

</button>
<button class="w-full max-w-[320px] bg-transparent text-primary font-label-sm text-label-sm py-4 rounded-full hover:bg-surface-container-low transition-colors duration-300 active:scale-[0.98]">

</div>

            </p>
</div>
</main>
<style>
        .animate-fade-in-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
